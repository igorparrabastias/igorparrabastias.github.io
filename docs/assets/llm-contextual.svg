<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 210" font-family="system-ui, sans-serif" role="img" aria-label="Embeddings contextuales: ELMo y BERT dan a banco un vector distinto según la frase">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:1.5}
    .v1{fill:#3a47b8}
    .v2{fill:#7782d6}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .tw{font-size:11px;font-weight:700;fill:#fff;text-anchor:middle}
    .sense{font-size:12px;fill:#333;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:1.8;fill:none}
    .cap{font-size:12px;fill:#3a47b8;text-anchor:middle}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
  </style>
  <rect width="620" height="210" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="310" y="30">La solución: embeddings contextuales (ELMo, BERT)</text>

  <rect class="box" x="30" y="55" width="240" height="34" rx="6"/><text class="sense" x="150" y="77">"…banco del parque"</text>
  <rect class="box" x="30" y="120" width="240" height="34" rx="6"/><text class="sense" x="150" y="142">"…dinero del banco"</text>

  <rect class="bd" x="330" y="80" width="80" height="50" rx="8" fill="#3a47b8"/><text class="tw" x="370" y="100">modelo</text><text class="tw" x="370" y="116" font-size="9">contextual</text>

  <rect class="v1" x="460" y="55" width="120" height="34" rx="6"/><text class="tw" x="520" y="77">vector banco₁</text>
  <rect class="v2" x="460" y="120" width="120" height="34" rx="6"/><text class="tw" x="520" y="142">vector banco₂</text>

  <line class="fl" x1="270" y1="72"  x2="330" y2="100" marker-end="url(#a)"/>
  <line class="fl" x1="270" y1="137" x2="330" y2="112" marker-end="url(#a)"/>
  <line class="fl" x1="410" y1="98"  x2="460" y2="74" marker-end="url(#a)"/>
  <line class="fl" x1="410" y1="114" x2="460" y2="135" marker-end="url(#a)"/>

  <text class="cap" x="310" y="185">Misma palabra, DOS vectores distintos: el modelo mira toda la frase antes de decidir.</text>
</svg>
