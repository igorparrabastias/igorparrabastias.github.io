<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" font-family="system-ui, sans-serif" role="img" aria-label="Tokenización: el texto se parte en sub-palabras (tokens) que se mapean a números">
  <style>
    .txt{fill:#f6f7fc;stroke:#3a47b8;stroke-width:1.5}
    .tok{fill:#eef0fb;stroke:#3a47b8;stroke-width:1.5}
    .id{fill:#3a47b8}
    .t{font-size:13px;fill:#333;text-anchor:middle;font-family:ui-monospace,monospace}
    .tk{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle;font-family:ui-monospace,monospace}
    .idw{font-size:11px;font-weight:700;fill:#fff;text-anchor:middle;font-family:ui-monospace,monospace}
    .lbl{font-size:11px;fill:#888;text-anchor:start}
    .fl{stroke:#9aa0c8;stroke-width:1.8;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
  </style>
  <rect width="640" height="200" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="320" y="28">Tokenización: del texto a números</text>

  <rect class="txt" x="170" y="45" width="300" height="30" rx="6"/><text class="t" x="320" y="65">"internacionalización"</text>
  <text class="lbl" x="478" y="64">texto</text>

  <line class="fl" x1="320" y1="75" x2="320" y2="95" marker-end="url(#a)"/>

  <rect class="tok" x="120" y="100" width="90"  height="28"/><text class="tk" x="165" y="119">inter</text>
  <rect class="tok" x="215" y="100" width="95"  height="28"/><text class="tk" x="262" y="119">nacional</text>
  <rect class="tok" x="315" y="100" width="70"  height="28"/><text class="tk" x="350" y="119">iza</text>
  <rect class="tok" x="390" y="100" width="80"  height="28"/><text class="tk" x="430" y="119">ción</text>
  <text class="lbl" x="478" y="119">tokens</text>

  <line class="fl" x1="320" y1="128" x2="320" y2="143" marker-end="url(#a)"/>

  <rect class="id" x="120" y="148" width="90"  height="26"/><text class="idw" x="165" y="166">8042</text>
  <rect class="id" x="215" y="148" width="95"  height="26"/><text class="idw" x="262" y="166">1577</text>
  <rect class="id" x="315" y="148" width="70"  height="26"/><text class="idw" x="350" y="166">309</text>
  <rect class="id" x="390" y="148" width="80"  height="26"/><text class="idw" x="430" y="166">112</text>
  <text class="lbl" x="478" y="165">IDs</text>

  <text class="cap" x="300" y="192">Una palabra larga puede ser varios tokens; son la unidad real que el modelo cuenta y procesa.</text>
</svg>
