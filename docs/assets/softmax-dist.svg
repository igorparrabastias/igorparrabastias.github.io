<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="system-ui, sans-serif" role="img" aria-label="Softmax: de números internos a una distribución de probabilidad sobre el vocabulario">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .lab{font-size:13px;fill:#333;text-anchor:middle}
    .num{font-size:12px;fill:#666;text-anchor:middle}
    .bar{fill:#3a47b8}
    .barlo{fill:#aab0dd}
    .cap{font-size:12px;fill:#666}
    .ttl{font-size:12px;font-weight:700;fill:#333;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
  </style>
  <rect width="640" height="300" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0c8"/></marker></defs>

  <text class="ttl" x="120" y="30">logits (crudos)</text>
  <!-- logits column -->
  <rect class="box" x="60" y="55"  width="120" height="30"/><text class="lab" x="120" y="75">gato &#160;&#160; 3.1</text>
  <rect class="box" x="60" y="95"  width="120" height="30"/><text class="lab" x="120" y="115">perro &#160; 1.8</text>
  <rect class="box" x="60" y="135" width="120" height="30"/><text class="lab" x="120" y="155">silla &#160;&#160; 0.4</text>
  <rect class="box" x="60" y="175" width="120" height="30"/><text class="lab" x="120" y="195">azul &#160;&#160; −0.6</text>

  <!-- softmax box -->
  <rect class="box" x="225" y="105" width="95" height="50" fill="#3a47b8"/>
  <text class="lab" x="272" y="135" fill="#fff" font-weight="700">softmax</text>
  <line class="fl" x1="180" y1="120" x2="225" y2="125" marker-end="url(#a)"/>
  <line class="fl" x1="320" y1="130" x2="365" y2="130" marker-end="url(#a)"/>

  <!-- prob bars -->
  <text class="ttl" x="490" y="30">P(siguiente token)</text>
  <line class="fl" x1="380" y1="55" x2="380" y2="245"/>
  <line class="fl" x1="380" y1="245" x2="625" y2="245"/>
  <rect class="bar"   x="385" y="70"  width="180" height="28"/><text class="num" x="585" y="90">0.66</text><text class="lab" x="385" y="64" text-anchor="start" font-size="11">gato</text>
  <rect class="bar"   x="385" y="108" width="65"  height="28"/><text class="num" x="470" y="128">0.24</text><text class="lab" x="385" y="102" text-anchor="start" font-size="11">perro</text>
  <rect class="barlo" x="385" y="146" width="22"  height="28"/><text class="num" x="428" y="166">0.08</text><text class="lab" x="385" y="140" text-anchor="start" font-size="11">silla</text>
  <rect class="barlo" x="385" y="184" width="8"   height="28"/><text class="num" x="412" y="204">0.02</text><text class="lab" x="385" y="178" text-anchor="start" font-size="11">azul</text>

  <text class="cap" x="60" y="285">El modelo no "sabe": estima probabilidades. Las barras suman 1 — y se muestrea de ahí.</text>
</svg>
