<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 210" font-family="system-ui, sans-serif" role="img" aria-label="Camino de datos: el PC direcciona la memoria, la instrucción llega a la unidad de control y los datos fluyen entre registros y ALU">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .bd{fill:#3a47b8}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .tw{font-size:12px;font-weight:700;fill:#fff;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .cap{font-size:12px;fill:#666;text-anchor:middle}
    .lbl{font-size:10px;fill:#888;text-anchor:middle}
  </style>
  <rect width="620" height="210" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0c8"/></marker></defs>

  <rect class="box" x="30"  y="80" width="70"  height="44" rx="8"/><text class="t" x="65"  y="107">PC</text>
  <rect class="box" x="160" y="80" width="100" height="44" rx="8"/><text class="t" x="210" y="107">Memoria</text>
  <rect class="bd"  x="330" y="80" width="120" height="44" rx="8"/><text class="tw" x="390" y="107">U. de control</text>
  <rect class="box" x="510" y="50" width="80"  height="40" rx="8"/><text class="t" x="550" y="75">Registros</text>
  <rect class="box" x="510" y="115" width="80" height="40" rx="8"/><text class="t" x="550" y="140">ALU</text>

  <line class="fl" x1="100" y1="102" x2="160" y2="102" marker-end="url(#a)"/><text class="lbl" x="130" y="94">dirección</text>
  <line class="fl" x1="260" y1="102" x2="330" y2="102" marker-end="url(#a)"/><text class="lbl" x="295" y="94">instrucción</text>
  <line class="fl" x1="450" y1="95" x2="510" y2="72" marker-end="url(#a)"/>
  <line class="fl" x1="450" y1="110" x2="510" y2="132" marker-end="url(#a)"/><text class="lbl" x="480" y="128">señales</text>
  <!-- registros <-> ALU -->
  <line class="fl" x1="550" y1="90" x2="550" y2="115" marker-end="url(#a)"/>
  <line class="fl" x1="535" y1="115" x2="535" y2="90" marker-end="url(#a)"/>

  <text class="cap" x="310" y="185">El PC dice qué leer; la instrucción dirige el flujo de datos entre registros y ALU.</text>
</svg>
