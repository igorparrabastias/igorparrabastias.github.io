<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" font-family="system-ui, sans-serif" role="img" aria-label="Responder directo frente a generar una cadena de pensamiento antes de la respuesta">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .step{fill:#fff;stroke:#3a47b8;stroke-width:1.5}
    .t{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .tag{font-size:10px;fill:#888;text-anchor:middle}
    .ok{fill:#e0663f;font-size:10px;font-weight:700;text-anchor:middle}
  </style>
  <rect width="620" height="220" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="310" y="26">Responder directo vs. cadena de pensamiento</text>

  <text class="tag" x="60" y="62">directo</text>
  <rect class="box" x="30" y="70" width="80" height="32" rx="6"/><text class="t" x="70" y="90">pregunta</text>
  <line class="fl" x1="110" y1="86" x2="160" y2="86" marker-end="url(#a)"/>
  <rect class="box" x="160" y="70" width="80" height="32" rx="6"/><text class="t" x="200" y="90">modelo</text>
  <line class="fl" x1="240" y1="86" x2="290" y2="86" marker-end="url(#a)"/>
  <rect class="box" x="290" y="70" width="90" height="32" rx="6"/><text class="t" x="335" y="90">respuesta</text>
  <text class="tag" x="480" y="90">rápido, pero falla más</text>

  <text class="tag" x="70" y="140">razonamiento (más cómputo al responder)</text>
  <rect class="box" x="30" y="150" width="70" height="32" rx="6"/><text class="t" x="65" y="170">pregunta</text>
  <line class="fl" x1="100" y1="166" x2="135" y2="166" marker-end="url(#a)"/>
  <rect class="step" x="135" y="150" width="64" height="32" rx="6"/><text class="t" x="167" y="170">paso 1</text>
  <line class="fl" x1="199" y1="166" x2="219" y2="166" marker-end="url(#a)"/>
  <rect class="step" x="219" y="150" width="64" height="32" rx="6"/><text class="t" x="251" y="170">paso 2</text>
  <line class="fl" x1="283" y1="166" x2="303" y2="166" marker-end="url(#a)"/>
  <rect class="step" x="303" y="150" width="64" height="32" rx="6"/><text class="t" x="335" y="170">paso 3</text>
  <line class="fl" x1="367" y1="166" x2="387" y2="166" marker-end="url(#a)"/>
  <rect class="box" x="387" y="150" width="80" height="32" rx="6"/><text class="t" x="427" y="170">respuesta</text>
  <text class="ok" x="540" y="170">acierta más</text>

  <text class="cap" x="310" y="208">Dejar "pensar más" al modelo (test-time compute) mejora problemas difíciles, a cambio de tiempo y coste.</text>
</svg>
