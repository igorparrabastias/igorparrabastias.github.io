<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="system-ui, sans-serif" role="img" aria-label="Símbolos de las puertas lógicas AND, OR, NOT y XOR">
  <style>
    .g{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .w{stroke:#9aa0c8;stroke-width:2;fill:none}
    .nm{font-size:13px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .cap{font-size:12px;fill:#666;text-anchor:middle}
  </style>
  <rect width="600" height="200" fill="#ffffff"/>

  <!-- AND: D shape -->
  <path class="g" d="M 60 50 L 60 110 L 95 110 A 30 30 0 0 0 95 50 Z"/>
  <line class="w" x1="40" y1="65" x2="60" y2="65"/><line class="w" x1="40" y1="95" x2="60" y2="95"/>
  <line class="w" x1="125" y1="80" x2="150" y2="80"/>
  <text class="nm" x="92" y="140">AND</text>

  <!-- OR: curved -->
  <path class="g" d="M 200 50 Q 225 80 200 110 Q 250 110 275 80 Q 250 50 200 50 Z"/>
  <line class="w" x1="178" y1="65" x2="208" y2="65"/><line class="w" x1="178" y1="95" x2="208" y2="95"/>
  <line class="w" x1="275" y1="80" x2="300" y2="80"/>
  <text class="nm" x="240" y="140">OR</text>

  <!-- NOT: triangle + bubble -->
  <path class="g" d="M 350 52 L 350 108 L 395 80 Z"/>
  <circle class="g" cx="403" cy="80" r="7"/>
  <line class="w" x1="325" y1="80" x2="350" y2="80"/>
  <line class="w" x1="410" y1="80" x2="435" y2="80"/>
  <text class="nm" x="378" y="140">NOT</text>

  <!-- XOR: OR with extra arc -->
  <path class="g" d="M 490 50 Q 515 80 490 110 Q 540 110 565 80 Q 540 50 490 50 Z"/>
  <path class="w" d="M 482 50 Q 507 80 482 110"/>
  <line class="w" x1="465" y1="65" x2="495" y2="65"/><line class="w" x1="465" y1="95" x2="495" y2="95"/>
  <line class="w" x1="565" y1="80" x2="585" y2="80"/>
  <text class="nm" x="528" y="140">XOR</text>

  <text class="cap" x="300" y="178">Cada operación booleana es un circuito: el ladrillo físico del que se hace todo.</text>
</svg>
