<svg width="1240" height="440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" font-family="system-ui, sans-serif" role="img" aria-label="Interpretabilidad: los conceptos están superpuestos en muchas neuronas, y un autoencoder disperso los separa en características interpretables">
  <style>
    .t{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .lbl{font-size:10px;fill:#666;text-anchor:middle}
    .feat{fill:#eef0fb;stroke:#3a47b8;stroke-width:1.5}
  </style>
  <rect width="620" height="220" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="310" y="26">Abrir la caja negra con autoencoders dispersos</text>

  <!-- superposición: maraña -->
  <text class="t" x="120" y="54">superposición</text>
  <g>
    <circle cx="80" cy="90"  r="11" fill="#7782d6"/><circle cx="120" cy="80" r="11" fill="#aab0dd"/><circle cx="160" cy="100" r="11" fill="#7782d6"/>
    <circle cx="95" cy="125" r="11" fill="#aab0dd"/><circle cx="140" cy="130" r="11" fill="#7782d6"/><circle cx="180" cy="120" r="11" fill="#aab0dd"/>
    <path d="M80,90 L120,80 M120,80 L160,100 M80,90 L95,125 M95,125 L140,130 M140,130 L180,120 M160,100 L140,130 M120,80 L140,130" stroke="#9aa0c8" stroke-width="1.2" fill="none"/>
  </g>
  <text class="lbl" x="120" y="160">conceptos mezclados en muchas neuronas</text>

  <line class="fl" x1="215" y1="110" x2="280" y2="110" marker-end="url(#a)"/>
  <text class="lbl" x="247" y="100">SAE</text>

  <!-- features limpias -->
  <text class="t" x="455" y="54">características interpretables</text>
  <rect class="feat" x="310" y="70" width="290" height="26" rx="5"/><rect x="322" y="77" width="12" height="12" rx="2" fill="#3a47b8"/><text class="lbl" x="468" y="87">"menciones a puentes"</text>
  <rect class="feat" x="310" y="104" width="290" height="26" rx="5"/><rect x="322" y="111" width="12" height="12" rx="2" fill="#3a47b8"/><text class="lbl" x="468" y="121">"código en Python"</text>
  <rect class="feat" x="310" y="138" width="290" height="26" rx="5"/><rect x="322" y="145" width="12" height="12" rx="2" fill="#3a47b8"/><text class="lbl" x="468" y="155">"tono de disculpa"</text>

  <text class="cap" x="310" y="195">Y, lo más llamativo: se pueden manipular esas características para alterar el comportamiento del modelo.</text>
</svg>
