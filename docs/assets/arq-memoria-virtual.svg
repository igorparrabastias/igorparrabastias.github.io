<svg width="1280" height="520" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" font-family="system-ui, sans-serif" role="img" aria-label="Memoria virtual: las páginas virtuales se traducen a marcos físicos mediante la tabla de páginas; lo que no cabe va al disco">
  <style>
    .v{fill:#eef0fb;stroke:#3a47b8;stroke-width:1.5}
    .p{fill:#dfe3f7;stroke:#3a47b8;stroke-width:1.5}
    .tbl{fill:#3a47b8}
    .disk{fill:#f3d7cb;stroke:#e0663f;stroke-width:1.5}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .tw{font-size:12px;font-weight:700;fill:#fff;text-anchor:middle}
    .lbl{font-size:12px;font-weight:700;fill:#333;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:1.8;fill:none}
    .fd{stroke:#e0663f;stroke-width:1.8;fill:none;stroke-dasharray:4 3}
    .cap{font-size:12px;fill:#666;text-anchor:middle}
  </style>
  <rect width="640" height="260" fill="#ffffff"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#e0663f"/></marker>
  </defs>

  <text class="lbl" x="80" y="38">Páginas virtuales</text>
  <text class="lbl" x="320" y="38">Tabla de páginas</text>
  <text class="lbl" x="560" y="38">RAM (marcos)</text>

  <rect class="v" x="40" y="50" width="80" height="30"/><text class="t" x="80" y="70">VP 0</text>
  <rect class="v" x="40" y="85" width="80" height="30"/><text class="t" x="80" y="105">VP 1</text>
  <rect class="v" x="40" y="120" width="80" height="30"/><text class="t" x="80" y="140">VP 2</text>
  <rect class="v" x="40" y="155" width="80" height="30"/><text class="t" x="80" y="175">VP 3</text>

  <rect class="tbl" x="270" y="50" width="100" height="135" rx="6"/>
  <text class="tw" x="320" y="75">0 → M2</text>
  <text class="tw" x="320" y="100">1 → disco</text>
  <text class="tw" x="320" y="125">2 → M0</text>
  <text class="tw" x="320" y="150">3 → M1</text>
  <text class="cap" x="320" y="200" font-size="10">(MMU + TLB)</text>

  <rect class="p" x="520" y="50" width="80" height="30"/><text class="t" x="560" y="70">M0</text>
  <rect class="p" x="520" y="85" width="80" height="30"/><text class="t" x="560" y="105">M1</text>
  <rect class="p" x="520" y="120" width="80" height="30"/><text class="t" x="560" y="140">M2</text>

  <line class="fl" x1="120" y1="65" x2="270" y2="65" marker-end="url(#a)"/>
  <line class="fl" x1="370" y1="65" x2="520" y2="135" marker-end="url(#a)"/>

  <!-- page fault al disco -->
  <rect class="disk" x="270" y="205" width="100" height="34" rx="6"/><text class="t" x="320" y="227" fill="#e0663f">Disco (swap)</text>
  <line class="fd" x1="320" y1="185" x2="320" y2="205" marker-end="url(#ao)"/>

  <text class="cap" x="505" y="235">Cada proceso cree tener toda la RAM;</text>
  <text class="cap" x="505" y="251">la MMU traduce y aísla.</text>
</svg>
