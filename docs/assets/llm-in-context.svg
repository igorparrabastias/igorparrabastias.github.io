<svg width="1280" height="460" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230" font-family="system-ui, sans-serif" role="img" aria-label="Aprendizaje en contexto: el prompt incluye ejemplos y el modelo resuelve el nuevo caso sin cambiar sus pesos">
  <style>
    .prompt{fill:#f6f7fc;stroke:#3a47b8;stroke-width:1.5}
    .bd{fill:#3a47b8}
    .ex{font-size:12px;fill:#333;font-family:ui-monospace,monospace}
    .q{font-size:12px;fill:#e0663f;font-weight:700;font-family:ui-monospace,monospace}
    .tw{font-size:12px;font-weight:700;fill:#fff;text-anchor:middle}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:1.8;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
  </style>
  <rect width="640" height="230" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="320" y="28">Aprendizaje en contexto (few-shot)</text>

  <rect class="prompt" x="30" y="45" width="300" height="150" rx="8"/>
  <text class="ex" x="48" y="75">sea → sea</text>
  <text class="ex" x="48" y="100">perro → dog</text>
  <text class="ex" x="48" y="125">casa → house</text>
  <text class="ex" x="48" y="150">gato → cat</text>
  <text class="q"  x="48" y="178">queso → ___</text>
  <text class="cap" x="180" y="210">el prompt: unos ejemplos + la pregunta</text>

  <rect class="bd" x="400" y="90" width="90" height="50" rx="8"/><text class="tw" x="445" y="120">LLM</text>
  <line class="fl" x1="330" y1="115" x2="400" y2="115" marker-end="url(#a)"/>

  <rect class="prompt" x="540" y="95" width="80" height="40" rx="8" stroke="#e0663f"/><text class="t" x="580" y="120" fill="#e0663f">cheese</text>
  <line class="fl" x1="490" y1="115" x2="540" y2="115" marker-end="url(#a)"/>

  <text class="cap" x="445" y="170">aprende la tarea</text>
  <text class="cap" x="445" y="186" fill="#3a47b8">SIN cambiar sus pesos</text>
</svg>
