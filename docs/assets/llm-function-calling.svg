<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230" font-family="system-ui, sans-serif" role="img" aria-label="Function calling: el LLM emite una llamada estructurada, una herramienta la ejecuta y el resultado vuelve al modelo">
  <style>
    .bd{fill:#3a47b8}
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .tool{fill:#dfe3f7;stroke:#3a47b8;stroke-width:2}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .tw{font-size:12px;font-weight:700;fill:#fff;text-anchor:middle}
    .mono{font-size:11px;fill:#3a47b8;text-anchor:middle;font-family:ui-monospace,monospace}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .step{font-size:10px;fill:#888;text-anchor:middle}
  </style>
  <rect width="640" height="230" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="320" y="28">Function calling: el LLM no ejecuta, pide ejecutar</text>

  <rect class="bd"  x="40"  y="90" width="100" height="50" rx="8"/><text class="tw" x="90" y="120">LLM</text>
  <rect class="box" x="240" y="85" width="160" height="40" rx="6"/><text class="mono" x="320" y="109">clima("Madrid")</text>
  <rect class="tool" x="500" y="90" width="110" height="50" rx="8"/><text class="t" x="555" y="113">herramienta</text><text class="step" x="555" y="130">(API del clima)</text>

  <line class="fl" x1="140" y1="105" x2="240" y2="105" marker-end="url(#a)"/><text class="step" x="190" y="96">1 · pide</text>
  <line class="fl" x1="400" y1="105" x2="500" y2="105" marker-end="url(#a)"/><text class="step" x="450" y="96">2 · ejecuta</text>

  <!-- resultado de vuelta -->
  <path class="fl" d="M 555 140 L 555 175 L 90 175 L 90 140" marker-end="url(#a)"/>
  <text class="step" x="320" y="170">3 · "18 °C, soleado" vuelve al modelo</text>

  <text class="cap" x="320" y="205">El modelo emite una llamada ESTRUCTURADA; el sistema la ejecuta y le devuelve el resultado,</text>
  <text class="cap" x="320" y="221" fill="#3a47b8">y entonces el LLM redacta la respuesta final. Así supera lo que "sabe" de memoria.</text>
</svg>
