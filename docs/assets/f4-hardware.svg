<svg width="1240" height="420" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 210" font-family="system-ui, sans-serif" role="img" aria-label="El hardware del futuro: de la GPU a chips a medida para inferencia, computación fotónica y enfoques neuromórficos">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .t{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .sub{font-size:9px;fill:#888;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .now{font-size:10px;font-weight:700;fill:#2e8b57;text-anchor:middle}
    .far{font-size:10px;font-weight:700;fill:#888;text-anchor:middle}
  </style>
  <rect width="620" height="210" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="310" y="26">El silicio también se mueve</text>

  <rect class="box" x="25"  y="80" width="120" height="52" rx="8"/><text class="t" x="85" y="104">GPU</text><text class="sub" x="85" y="120">la reina hoy</text>
  <rect class="box" x="175" y="80" width="120" height="52" rx="8"/><text class="t" x="235" y="100">TPU / ASIC</text><text class="sub" x="235" y="116">a medida · inferencia</text>
  <rect class="box" x="325" y="80" width="120" height="52" rx="8"/><text class="t" x="385" y="100">fotónica</text><text class="sub" x="385" y="116">luz, menos consumo</text>
  <rect class="box" x="475" y="80" width="120" height="52" rx="8" stroke-dasharray="4 3"/><text class="t" x="535" y="100">neuromórfico</text><text class="sub" x="535" y="116">inspirado en cerebro</text>

  <line class="fl" x1="145" y1="106" x2="175" y2="106" marker-end="url(#a)"/>
  <line class="fl" x1="295" y1="106" x2="325" y2="106" marker-end="url(#a)"/>
  <line class="fl" x1="445" y1="106" x2="475" y2="106" marker-end="url(#a)"/>

  <text class="now" x="145" y="150">⟵ ya en uso ⟶</text>
  <text class="far" x="460" y="150">⟵ horizonte lejano ⟶</text>

  <text class="cap" x="310" y="185">Ante los límites de energía y coste, cada vatio cuenta: la innovación en hardware vuelve a ser decisiva.</text>
</svg>
