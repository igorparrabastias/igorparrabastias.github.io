<svg width="1240" height="440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" font-family="system-ui, sans-serif" role="img" aria-label="Benchmarks modernos: GPQA, MMLU-Pro, SWE-bench y ARC-AGI miden tareas verificables, realistas y difíciles de memorizar">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .sub{font-size:9.5px;fill:#666;text-anchor:middle}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
  </style>
  <rect width="620" height="220" fill="#ffffff"/>
  <text class="ttl" x="310" y="26">Pruebas más duras y más limpias</text>

  <rect class="box" x="30"  y="50" width="130" height="56" rx="8"/><text class="t" x="95" y="74">GPQA</text><text class="sub" x="95" y="92">ciencia, nivel posgrado</text>
  <rect class="box" x="175" y="50" width="130" height="56" rx="8"/><text class="t" x="240" y="74">MMLU-Pro</text><text class="sub" x="240" y="92">conocimiento general+</text>
  <rect class="box" x="320" y="50" width="130" height="56" rx="8"/><text class="t" x="385" y="74">SWE-bench</text><text class="sub" x="385" y="92">arregla issues reales</text>
  <rect class="box" x="465" y="50" width="125" height="56" rx="8" stroke="#e0663f"/><text class="t" x="527" y="74" fill="#e0663f">ARC-AGI</text><text class="sub" x="527" y="92">razonamiento abstracto</text>

  <rect x="465" y="125" width="125" height="44" rx="8" fill="#fbeee9" stroke="#e0663f" stroke-width="1.5"/>
  <text class="sub" x="527" y="142" fill="#333">fácil para humanos</text>
  <text class="sub" x="527" y="158" fill="#e0663f">difícil para máquinas</text>

  <text class="cap" x="270" y="140">Un buen benchmark moderno mide tareas</text>
  <text class="cap" x="270" y="158" >verificables, realistas y difíciles de memorizar.</text>

  <text class="cap" x="310" y="200">El reto es que sigan distinguiendo a medida que los modelos mejoran.</text>
</svg>
