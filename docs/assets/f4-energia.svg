<svg width="1240" height="440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" font-family="system-ui, sans-serif" role="img" aria-label="La electricidad como cuello de botella: el consumo de los datacenters podría duplicarse para 2030 y la red tarda años en ampliarse">
  <style>
    .axis{stroke:#9aa0c8;stroke-width:1.5}
    .bar{fill:#3a47b8}
    .t{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .lbl{font-size:10px;fill:#666;text-anchor:middle}
    .warn{font-size:11px;font-weight:700;fill:#e0663f;text-anchor:middle}
  </style>
  <rect width="620" height="220" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="310" y="26">La red eléctrica: el verdadero límite</text>

  <line class="axis" x1="55" y1="165" x2="270" y2="165"/>
  <line class="axis" x1="55" y1="55" x2="55" y2="165"/>
  <rect class="bar" x="95"  y="120" width="50" height="45"/><text class="lbl" x="120" y="180">~2025</text>
  <rect class="bar" x="185" y="68"  width="50" height="97" opacity="0.7"/><text class="lbl" x="210" y="180">~2030</text>
  <line x1="120" y1="115" x2="200" y2="68" stroke="#e0663f" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text class="warn" x="165" y="50">se duplica</text>
  <text class="lbl" x="162" y="200">consumo eléctrico de datacenters</text>

  <line x1="300" y1="48" x2="300" y2="195" stroke="#ccc" stroke-width="1"/>

  <!-- cuello de botella -->
  <text class="t" x="460" y="60">construir cluster: rápido</text>
  <rect x="350" y="72" width="90" height="34" rx="6" fill="#eef0fb" stroke="#3a47b8" stroke-width="2"/><text class="t" x="395" y="93" font-size="10">megacluster</text>
  <text class="t" x="460" y="130" fill="#e0663f">conectar GW a la red: lento</text>
  <path d="M440,89 C500,89 500,150 440,150" fill="none" stroke="#9aa0c8" stroke-width="2"/>
  <rect x="350" y="133" width="90" height="34" rx="6" fill="#fbeee9" stroke="#e0663f" stroke-width="2"/><text class="t" x="395" y="154" font-size="10" fill="#e0663f">la red</text>

  <text class="cap" x="310" y="216">Por eso los laboratorios se aseguran su propia energía: nuclear, renovables con baterías, gas in situ.</text>
</svg>
