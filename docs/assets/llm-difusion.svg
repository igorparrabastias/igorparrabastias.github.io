<svg width="1280" height="420" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210" font-family="system-ui, sans-serif" role="img" aria-label="Difusión: partir de ruido y quitarlo paso a paso, guiado por el texto, hasta formar una imagen">
  <style>
    .frame{stroke:#3a47b8;stroke-width:1.5}
    .t{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .prompt{font-size:11px;fill:#e0663f;text-anchor:middle;font-weight:700}
  </style>
  <rect width="640" height="210" fill="#ffffff"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker>
    <pattern id="noise" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="4" fill="#fff"/><circle cx="1" cy="1" r="0.8" fill="#888"/><circle cx="3" cy="3" r="0.8" fill="#aaa"/><circle cx="3" cy="1" r="0.6" fill="#666"/></pattern>
  </defs>
  <text class="ttl" x="320" y="28">Difusión: de ruido a imagen, quitando ruido paso a paso</text>

  <rect class="frame" x="40"  y="55" width="90" height="90" fill="url(#noise)"/>
  <text class="t" x="85" y="162">ruido puro</text>

  <rect class="frame" x="180" y="55" width="90" height="90" fill="url(#noise)" opacity="0.6"/>
  <text class="t" x="225" y="162">paso 1</text>

  <rect class="frame" x="320" y="55" width="90" height="90" fill="#e3e7f5"/>
  <text class="t" x="365" y="162">paso 2…</text>

  <rect class="frame" x="460" y="55" width="90" height="90" fill="#cdd3f2"/>
  <!-- gato mínimo en vector (robusto, sin emoji) -->
  <g fill="#3a47b8" stroke="#3a47b8">
    <polygon points="487,92 493,74 501,90"/>
    <polygon points="523,92 517,74 509,90"/>
    <circle cx="505" cy="104" r="20" stroke="none"/>
    <circle cx="498" cy="101" r="2.5" fill="#fff" stroke="none"/>
    <circle cx="512" cy="101" r="2.5" fill="#fff" stroke="none"/>
  </g>
  <g stroke="#fff" stroke-width="1">
    <line x1="505" y1="108" x2="488" y2="106"/><line x1="505" y1="110" x2="488" y2="112"/>
    <line x1="505" y1="108" x2="522" y2="106"/><line x1="505" y1="110" x2="522" y2="112"/>
  </g>
  <text class="t" x="505" y="162">imagen final</text>

  <line class="fl" x1="130" y1="100" x2="180" y2="100" marker-end="url(#a)"/>
  <line class="fl" x1="270" y1="100" x2="320" y2="100" marker-end="url(#a)"/>
  <line class="fl" x1="410" y1="100" x2="460" y2="100" marker-end="url(#a)"/>

  <text class="prompt" x="320" y="185">guiado por el texto: "un gato"</text>
  <text class="cap" x="320" y="202">El modelo aprende a revertir el ruido; el prompt dirige hacia qué imagen converge.</text>
</svg>
