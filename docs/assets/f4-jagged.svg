<svg width="1200" height="430" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 215" font-family="system-ui, sans-serif" role="img" aria-label="El borde dentado: la IA es brillante en algunas tareas difíciles y torpe en otras sencillas, sin un perfil de inteligencia uniforme">
  <style>
    .axis{stroke:#9aa0c8;stroke-width:1.5}
    .bar{fill:#3a47b8}
    .barlow{fill:#e0663f}
    .t{font-size:10px;fill:#666;text-anchor:middle}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .lbl{font-size:10px;font-weight:700;text-anchor:middle}
  </style>
  <rect width="600" height="215" fill="#ffffff"/>
  <text class="ttl" x="300" y="26">El "borde dentado" de la capacidad</text>

  <line class="axis" x1="55" y1="160" x2="560" y2="160"/>
  <line class="axis" x1="55" y1="50" x2="55" y2="160"/>
  <text class="t" x="30" y="60" transform="rotate(-90 30 105)">acierto</text>

  <rect class="bar"    x="80"  y="62"  width="48" height="98"/><text class="t" x="104" y="174">mates</text>
  <rect class="barlow" x="148" y="125" width="48" height="35"/><text class="t" x="172" y="174">contar letras</text>
  <rect class="bar"    x="216" y="70"  width="48" height="90"/><text class="t" x="240" y="174">código</text>
  <rect class="barlow" x="284" y="132" width="48" height="28"/><text class="t" x="308" y="174">acertijo simple</text>
  <rect class="bar"    x="352" y="58"  width="48" height="102"/><text class="t" x="376" y="174">examen posgrado</text>
  <rect class="barlow" x="420" y="120" width="48" height="40"/><text class="t" x="444" y="174">lógica de niño</text>

  <text class="lbl" x="240" y="195" fill="#3a47b8">brillante en tareas de doctorado…</text>
  <text class="lbl" x="445" y="195" fill="#e0663f">…torpe en otras triviales</text>

  <text class="cap" x="300" y="44">No es un perfil de inteligencia uniforme</text>
</svg>
