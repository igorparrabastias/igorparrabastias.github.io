<svg width="1240" height="540" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 270" font-family="system-ui, sans-serif" role="img" aria-label="Mezcla de expertos: un router envía cada token a solo 2 de 6 expertos">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .on{fill:#3a47b8;stroke:#3a47b8;stroke-width:2}
    .off{fill:#f2f3f7;stroke:#c2c7e0;stroke-width:2}
    .lbl{font-size:14px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .lblw{font-size:13px;font-weight:700;fill:#fff;text-anchor:middle}
    .lbloff{font-size:13px;fill:#aab;text-anchor:middle}
    .cap{font-size:12px;fill:#666}
    .flon{stroke:#3a47b8;stroke-width:2.5;fill:none}
    .floff{stroke:#c2c7e0;stroke-width:1.5;fill:none;stroke-dasharray:4 4}
  </style>
  <rect width="620" height="270" fill="#ffffff"/>
  <defs>
    <marker id="mon" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#3a47b8"/></marker>
    <marker id="moff" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#c2c7e0"/></marker>
  </defs>

  <!-- token -->
  <rect class="box" x="24" y="112" width="80" height="44" rx="8"/><text class="lbl" x="64" y="139">token</text>
  <line class="flon" x1="104" y1="134" x2="168" y2="134" marker-end="url(#mon)"/>

  <!-- router -->
  <rect class="box" x="170" y="104" width="104" height="60" rx="8"/><text class="lbl" x="222" y="130">router</text>
  <text class="cap" x="222" y="150" text-anchor="middle">elige 2</text>

  <!-- experts -->
  <!-- y centers: 28,68,108,148,188,228 -->
  <rect class="off" x="430" y="20"  width="160" height="32" rx="7"/><text class="lbloff" x="510" y="40">experto 1</text>
  <rect class="on"  x="430" y="60"  width="160" height="32" rx="7"/><text class="lblw"   x="510" y="80">experto 2 ✓</text>
  <rect class="off" x="430" y="100" width="160" height="32" rx="7"/><text class="lbloff" x="510" y="120">experto 3</text>
  <rect class="off" x="430" y="140" width="160" height="32" rx="7"/><text class="lbloff" x="510" y="160">experto 4</text>
  <rect class="on"  x="430" y="180" width="160" height="32" rx="7"/><text class="lblw"   x="510" y="200">experto 5 ✓</text>
  <rect class="off" x="430" y="220" width="160" height="32" rx="7"/><text class="lbloff" x="510" y="240">experto 6</text>

  <!-- arrows router -> experts -->
  <line class="floff" x1="274" y1="128" x2="430" y2="36"  marker-end="url(#moff)"/>
  <line class="flon"  x1="274" y1="130" x2="430" y2="76"  marker-end="url(#mon)"/>
  <line class="floff" x1="274" y1="132" x2="430" y2="116" marker-end="url(#moff)"/>
  <line class="floff" x1="274" y1="136" x2="430" y2="156" marker-end="url(#moff)"/>
  <line class="flon"  x1="274" y1="138" x2="430" y2="196" marker-end="url(#mon)"/>
  <line class="floff" x1="274" y1="140" x2="430" y2="236" marker-end="url(#moff)"/>

  <text class="cap" x="24" y="265">Cada token activa solo 2 de 6 expertos: el modelo tiene muchos parámetros, pero gasta como uno pequeño.</text>
</svg>
