<svg width="1640" height="800" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="system-ui, sans-serif" role="img" aria-label="Arquitectura de alto nivel de Uber: apps de pasajero y conductor conectan por un API gateway a los servicios de ubicacion, emparejamiento, despacho, ETA y pagos, que se apoyan en un geoindice tipo QuadTree, caches de ubicacion, colas de mensajes y bases de datos.">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .sub{fill:#ffffff;stroke:#3a47b8;stroke-width:1.5}
    .accent{fill:#3a47b8}
    .t{font-size:13px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .ts{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .tw{font-size:13px;font-weight:700;fill:#fff;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .lyr{font-size:11px;font-weight:700;fill:#9aa0c8;text-anchor:start}
    .fl{stroke:#9aa0c8;stroke-width:2.5;fill:none}
  </style>
  <rect width="820" height="400" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0c8"/></marker></defs>

  <!-- capa cliente -->
  <text class="lyr" x="20" y="30">Cliente</text>
  <rect class="box" x="40"  y="40" width="150" height="48" rx="10"/><text class="t" x="115" y="60">App Pasajero</text><text class="ts" x="115" y="76">pide viaje · ve mapa</text>
  <rect class="box" x="40"  y="104" width="150" height="48" rx="10"/><text class="t" x="115" y="124">App Conductor</text><text class="ts" x="115" y="140">envia GPS · acepta</text>

  <!-- gateway -->
  <text class="lyr" x="250" y="30">Borde</text>
  <rect class="accent" x="250" y="58" width="120" height="76" rx="10"/><text class="tw" x="310" y="92">API Gateway</text><text class="tw" x="310" y="110" style="font-size:11px">auth · rate limit</text>

  <!-- servicios -->
  <text class="lyr" x="430" y="30">Servicios</text>
  <rect class="sub" x="430" y="40" width="170" height="40" rx="10"/><text class="ts" x="515" y="64">Ubicacion (GPS ingest)</text>
  <rect class="sub" x="430" y="88" width="170" height="40" rx="10"/><text class="ts" x="515" y="112">Emparejamiento (matching)</text>
  <rect class="sub" x="430" y="136" width="170" height="40" rx="10"/><text class="ts" x="515" y="160">Despacho (dispatch)</text>
  <rect class="sub" x="430" y="184" width="170" height="40" rx="10"/><text class="ts" x="515" y="208">ETA / rutas</text>
  <rect class="sub" x="430" y="232" width="170" height="40" rx="10"/><text class="ts" x="515" y="256">Pagos</text>
  <rect class="sub" x="430" y="280" width="170" height="40" rx="10"/><text class="ts" x="515" y="304">Viajes (trip log)</text>

  <!-- datos / infra -->
  <text class="lyr" x="640" y="30">Datos · colas · cache</text>
  <rect class="box" x="640" y="40" width="160" height="46" rx="10"/><text class="t" x="720" y="60">Geoindice</text><text class="ts" x="720" y="76">QuadTree / geohash</text>
  <rect class="box" x="640" y="98" width="160" height="46" rx="10"/><text class="t" x="720" y="118">Cache ubicaciones</text><text class="ts" x="720" y="134">Redis (TTL corto)</text>
  <rect class="box" x="640" y="156" width="160" height="46" rx="10"/><text class="t" x="720" y="176">Colas de mensajes</text><text class="ts" x="720" y="192">Kafka (eventos GPS)</text>
  <rect class="box" x="640" y="214" width="160" height="46" rx="10"/><text class="t" x="720" y="234">DB viajes / usuarios</text><text class="ts" x="720" y="250">SQL sharded</text>
  <rect class="box" x="640" y="272" width="160" height="46" rx="10"/><text class="t" x="720" y="292">DB pagos</text><text class="ts" x="720" y="308">ACID</text>

  <!-- flujos cliente -> gateway -->
  <path class="fl" d="M190,64 L244,82" marker-end="url(#a)"/>
  <path class="fl" d="M190,128 L244,110" marker-end="url(#a)"/>
  <!-- gateway -> servicios -->
  <path class="fl" d="M370,80 L426,60" marker-end="url(#a)"/>
  <path class="fl" d="M370,92 L426,108" marker-end="url(#a)"/>
  <path class="fl" d="M370,108 L426,156" marker-end="url(#a)"/>
  <path class="fl" d="M370,120 L426,204" marker-end="url(#a)"/>
  <path class="fl" d="M370,130 L426,252" marker-end="url(#a)"/>
  <!-- servicios -> infra -->
  <path class="fl" d="M600,60 L636,63" marker-end="url(#a)"/>
  <path class="fl" d="M600,108 L636,75" marker-end="url(#a)"/>
  <path class="fl" d="M600,60 L636,118" marker-end="url(#a)"/>
  <path class="fl" d="M600,160 L636,179" marker-end="url(#a)"/>
  <path class="fl" d="M600,208 L636,179" marker-end="url(#a)"/>
  <path class="fl" d="M600,300 L636,237" marker-end="url(#a)"/>
  <path class="fl" d="M600,256 L636,295" marker-end="url(#a)"/>

  <text class="cap" x="410" y="392">Flujo: la app envia GPS y peticiones al gateway; ubicacion alimenta el geoindice; emparejamiento consulta vecinos cercanos; despacho notifica al conductor; eventos viajan por colas hacia el log y los pagos.</text>
</svg>
