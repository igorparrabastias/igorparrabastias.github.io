<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230" font-family="system-ui, sans-serif" role="img" aria-label="Modelo any-to-any: recibe y produce texto, imagen, audio y vídeo en un mismo sistema">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:1.5}
    .core{fill:#3a47b8}
    .t{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .tw{font-size:12px;font-weight:700;fill:#fff;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
  </style>
  <rect width="640" height="230" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="320" y="26">Un solo modelo, cualquier entrada y salida</text>

  <rect class="box" x="30" y="55"  width="100" height="28" rx="6"/><text class="t" x="80" y="74">texto</text>
  <rect class="box" x="30" y="93"  width="100" height="28" rx="6"/><text class="t" x="80" y="112">imagen</text>
  <rect class="box" x="30" y="131" width="100" height="28" rx="6"/><text class="t" x="80" y="150">audio</text>
  <rect class="box" x="30" y="169" width="100" height="28" rx="6"/><text class="t" x="80" y="188">vídeo</text>

  <rect class="core" x="250" y="90" width="140" height="70" rx="10"/><text class="tw" x="320" y="120">modelo</text><text class="tw" x="320" y="138" font-size="9">espacio común</text>

  <rect class="box" x="510" y="55"  width="100" height="28" rx="6"/><text class="t" x="560" y="74">texto</text>
  <rect class="box" x="510" y="93"  width="100" height="28" rx="6"/><text class="t" x="560" y="112">imagen</text>
  <rect class="box" x="510" y="131" width="100" height="28" rx="6"/><text class="t" x="560" y="150">audio</text>
  <rect class="box" x="510" y="169" width="100" height="28" rx="6"/><text class="t" x="560" y="188">vídeo</text>

  <line class="fl" x1="130" y1="69"  x2="250" y2="110" marker-end="url(#a)"/>
  <line class="fl" x1="130" y1="107" x2="250" y2="120" marker-end="url(#a)"/>
  <line class="fl" x1="130" y1="145" x2="250" y2="130" marker-end="url(#a)"/>
  <line class="fl" x1="130" y1="183" x2="250" y2="140" marker-end="url(#a)"/>

  <line class="fl" x1="390" y1="110" x2="510" y2="69"  marker-end="url(#a)"/>
  <line class="fl" x1="390" y1="120" x2="510" y2="107" marker-end="url(#a)"/>
  <line class="fl" x1="390" y1="130" x2="510" y2="145" marker-end="url(#a)"/>
  <line class="fl" x1="390" y1="140" x2="510" y2="183" marker-end="url(#a)"/>

  <text class="cap" x="320" y="218">"Any-to-any": en lugar de pegar módulos sueltos, un mismo sistema entiende y genera todas las formas.</text>
</svg>
