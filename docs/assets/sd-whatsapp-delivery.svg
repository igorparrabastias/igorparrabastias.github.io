<svg width="1440" height="720" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="system-ui, sans-serif" role="img" aria-label="Secuencia de entrega de WhatsApp con acuses: A envia un mensaje, el servidor lo persiste y confirma recibido, si B esta en linea lo entrega y si no lo guarda en el almacen offline, B se conecta y recibe con doble check entregado, y al abrir el chat responde leido en azul">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .sub{fill:#ffffff;stroke:#3a47b8;stroke-width:1.5}
    .col{fill:#f6f7fd;stroke:#c9cfee;stroke-width:1.5}
    .t{font-size:13px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .ts{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .lbl{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2.5;fill:none}
    .life{stroke:#c9cfee;stroke-width:1.5;stroke-dasharray:4 4}
    .num{font-size:10px;font-weight:700;fill:#ffffff;text-anchor:middle}
    .ck{font-size:12px;font-weight:700;text-anchor:middle}
  </style>
  <rect width="720" height="360" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0c8"/></marker></defs>

  <!-- Actores -->
  <rect class="box" x="40"  y="20" width="96" height="32" rx="10"/>
  <text class="ts" x="88"  y="40">A (emisor)</text>
  <rect class="box" x="246" y="20" width="96" height="32" rx="10"/>
  <text class="ts" x="294" y="40">Servidor</text>
  <rect class="sub" x="430" y="20" width="110" height="32" rx="10"/>
  <text class="ts" x="485" y="40">Almacen offline</text>
  <rect class="box" x="608" y="20" width="80" height="32" rx="10"/>
  <text class="ts" x="648" y="40">B (dest.)</text>

  <!-- Lifelines -->
  <line class="life" x1="88"  y1="52" x2="88"  y2="336"/>
  <line class="life" x1="294" y1="52" x2="294" y2="336"/>
  <line class="life" x1="485" y1="52" x2="485" y2="336"/>
  <line class="life" x1="648" y1="52" x2="648" y2="336"/>

  <!-- 1: A -> Servidor SEND -->
  <line class="fl" x1="88" y1="86" x2="294" y2="86" marker-end="url(#a)"/>
  <circle cx="100" cy="86" r="8" fill="#3a47b8"/><text class="num" x="100" y="90">1</text>
  <text class="lbl" x="195" y="80">SEND (msgId, ciphertext)</text>

  <!-- 2: Servidor persiste y confirma recibido -->
  <line class="fl" x1="294" y1="118" x2="88" y2="118" marker-end="url(#a)"/>
  <circle cx="282" cy="118" r="8" fill="#3a47b8"/><text class="num" x="282" y="122">2</text>
  <text class="lbl" x="195" y="112">ACK sent &#x2713; (tras persistir)</text>

  <!-- 3a: B offline -> guarda en almacen -->
  <line class="fl" x1="294" y1="156" x2="485" y2="156" marker-end="url(#a)"/>
  <circle cx="306" cy="156" r="8" fill="#3a47b8"/><text class="num" x="306" y="160">3</text>
  <text class="lbl" x="390" y="150">si B offline: guardar en buzon</text>

  <!-- B se conecta -->
  <line class="fl" x1="648" y1="190" x2="294" y2="190" marker-end="url(#a)"/>
  <text class="lbl" x="470" y="184">B se conecta (heartbeat)</text>

  <!-- 4: entrega (drena buzon) -->
  <line class="fl" x1="294" y1="222" x2="648" y2="222" marker-end="url(#a)"/>
  <circle cx="306" cy="222" r="8" fill="#3a47b8"/><text class="num" x="306" y="226">4</text>
  <text class="lbl" x="470" y="216">DELIVER (drena buzon en orden)</text>

  <!-- 4b: B -> ACK delivered -->
  <line class="fl" x1="648" y1="254" x2="88" y2="254" marker-end="url(#a)"/>
  <text class="ck" x="360" y="248" fill="#3a47b8">ACK delivered &#x2713;&#x2713;</text>

  <!-- 5: B abre -> read -->
  <line class="fl" x1="648" y1="292" x2="88" y2="292" marker-end="url(#a)"/>
  <circle cx="636" cy="292" r="8" fill="#3a47b8"/><text class="num" x="636" y="296">5</text>
  <text class="ck" x="360" y="286" fill="#1565c0">ACK read &#x2713;&#x2713; (azul)</text>

  <text class="cap" x="360" y="324">at-least-once + deduplicacion por msgId en el cliente; orden por secuencia de conversacion</text>
</svg>
