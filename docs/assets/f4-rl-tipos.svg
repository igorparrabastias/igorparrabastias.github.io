<svg width="1280" height="460" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230" font-family="system-ui, sans-serif" role="img" aria-label="Tres formas de aprendizaje por refuerzo según de dónde viene la recompensa: humano, otra IA o verificación automática">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .src{font-size:11px;fill:#333;text-anchor:middle}
    .sub{font-size:10px;fill:#888;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .cost{font-size:10px;font-weight:700;text-anchor:middle}
  </style>
  <rect width="640" height="230" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="320" y="26">¿De dónde viene la recompensa?</text>

  <rect class="box" x="30"  y="60" width="170" height="46" rx="8"/><text class="t" x="115" y="80">RLHF</text><text class="sub" x="115" y="97">preferencias humanas</text>
  <rect class="box" x="235" y="60" width="170" height="46" rx="8"/><text class="t" x="320" y="80">RLAIF</text><text class="sub" x="320" y="97">IA + constitución</text>
  <rect class="box" x="440" y="60" width="170" height="46" rx="8"/><text class="t" x="525" y="80">RLVR</text><text class="sub" x="525" y="97">verificación automática</text>

  <line class="fl" x1="115" y1="106" x2="115" y2="140" marker-end="url(#a)"/>
  <line class="fl" x1="320" y1="106" x2="320" y2="140" marker-end="url(#a)"/>
  <line class="fl" x1="525" y1="106" x2="525" y2="140" marker-end="url(#a)"/>

  <text class="src" x="115" y="156">un humano etiqueta</text>
  <text class="src" x="320" y="156">otro modelo juzga</text>
  <text class="src" x="525" y="156">✓ ¿el test pasa?</text>

  <text class="cost" x="115" y="180" fill="#e0663f">caro y lento</text>
  <text class="cost" x="320" y="180" fill="#7782d6">más escalable</text>
  <text class="cost" x="525" y="180" fill="#2e8b57">casi gratis y masivo</text>

  <text class="cap" x="320" y="212">Cuando la tarea es comprobable (código, matemáticas), la máquina genera su propia señal de entrenamiento.</text>
</svg>
