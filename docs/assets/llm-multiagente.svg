<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 230" font-family="system-ui, sans-serif" role="img" aria-label="Sistema multi-agente: un orquestador reparte subtareas a agentes especializados y reúne sus resultados">
  <style>
    .bd{fill:#3a47b8}
    .ag{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .tw{font-size:12px;font-weight:700;fill:#fff;text-anchor:middle}
    .t{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .sub{font-size:10px;fill:#888;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
  </style>
  <rect width="600" height="230" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="300" y="30">Multi-agente: dividir para vencer</text>

  <rect class="bd" x="220" y="55" width="160" height="46" rx="8"/><text class="tw" x="300" y="83">Orquestador</text>

  <rect class="ag" x="40"  y="150" width="140" height="54" rx="8"/><text class="t" x="110" y="174">Agente · investigar</text><text class="sub" x="110" y="192">busca fuentes</text>
  <rect class="ag" x="230" y="150" width="140" height="54" rx="8"/><text class="t" x="300" y="174">Agente · escribir</text><text class="sub" x="300" y="192">redacta</text>
  <rect class="ag" x="420" y="150" width="140" height="54" rx="8"/><text class="t" x="490" y="174">Agente · revisar</text><text class="sub" x="490" y="192">verifica</text>

  <line class="fl" x1="270" y1="101" x2="120" y2="150" marker-end="url(#a)"/>
  <line class="fl" x1="300" y1="101" x2="300" y2="150" marker-end="url(#a)"/>
  <line class="fl" x1="330" y1="101" x2="480" y2="150" marker-end="url(#a)"/>

  <text class="cap" x="300" y="225">Cada agente se especializa; el orquestador reparte subtareas y reúne los resultados.</text>
</svg>
