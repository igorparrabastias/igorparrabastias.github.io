<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 250" font-family="system-ui, sans-serif" role="img" aria-label="Circuito combinacional (sin memoria) frente a secuencial (con realimentación y reloj)">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .reg{fill:#3a47b8;stroke:#3a47b8;stroke-width:2}
    .t{font-size:13px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .tw{font-size:12px;font-weight:700;fill:#fff;text-anchor:middle}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#888;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .fb{stroke:#e0663f;stroke-width:2;fill:none}
  </style>
  <rect width="640" height="250" fill="#ffffff"/>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0c8"/></marker>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#e0663f"/></marker>
  </defs>

  <!-- Combinacional -->
  <text class="ttl" x="170" y="35">Combinacional</text>
  <text class="cap" x="170" y="52">la salida depende solo de las entradas</text>
  <line class="fl" x1="40" y1="120" x2="110" y2="120" marker-end="url(#a)"/>
  <text class="cap" x="70" y="110">entradas</text>
  <rect class="box" x="110" y="95" width="110" height="50" rx="8"/><text class="t" x="165" y="125">lógica</text>
  <line class="fl" x1="220" y1="120" x2="300" y2="120" marker-end="url(#a)"/>
  <text class="cap" x="265" y="110">salida</text>

  <!-- divisor -->
  <line x1="330" y1="30" x2="330" y2="225" stroke="#e6e6ef" stroke-width="1.5"/>

  <!-- Secuencial -->
  <text class="ttl" x="490" y="35">Secuencial</text>
  <text class="cap" x="490" y="52">depende también del estado anterior</text>
  <line class="fl" x1="358" y1="100" x2="430" y2="100" marker-end="url(#a)"/>
  <text class="cap" x="388" y="90">entradas</text>
  <rect class="box" x="430" y="78" width="110" height="50" rx="8"/><text class="t" x="485" y="108">lógica</text>
  <line class="fl" x1="540" y1="103" x2="612" y2="103" marker-end="url(#a)"/>
  <text class="cap" x="585" y="93">salida</text>
  <!-- registro de estado -->
  <rect class="reg" x="425" y="172" width="120" height="42" rx="8"/><text class="tw" x="485" y="198">estado</text>
  <!-- siguiente estado: lógica -> registro -->
  <line class="fb" x1="485" y1="128" x2="485" y2="172" marker-end="url(#ao)"/>
  <text class="cap" x="540" y="152" fill="#e0663f">sig. estado</text>
  <!-- realimentación: registro -> de vuelta a la lógica -->
  <path class="fb" d="M 425 193 L 398 193 L 398 116 L 430 116" marker-end="url(#ao)"/>
  <!-- reloj -->
  <line class="fb" x1="485" y1="240" x2="485" y2="216" marker-end="url(#ao)"/>
  <text class="cap" x="510" y="238" fill="#e0663f">reloj</text>
</svg>
