<svg width="1440" height="720" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="system-ui, sans-serif" role="img" aria-label="Geoindice espacial: un QuadTree subdivide el mapa en celdas, mas finas donde hay mas conductores; para un pedido se busca en la celda que lo contiene y en las celdas vecinas resaltadas">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .sub{fill:#ffffff;stroke:#3a47b8;stroke-width:1.5}
    .hl{fill:#dfe4fb;stroke:#3a47b8;stroke-width:2}
    .t{font-size:13px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .ts{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .capl{font-size:11px;fill:#666}
    .fl{stroke:#9aa0c8;stroke-width:2.5;fill:none}
    .drv{fill:#9aa0c8}
  </style>
  <rect width="720" height="360" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0c8"/></marker></defs>

  <text x="210" y="28" class="t">Geoíndice QuadTree: celda del pedido + vecinas</text>

  <!-- big quadrants (low density, coarse cells) -->
  <rect class="sub" x="210" y="40"  width="150" height="150"/>
  <rect class="sub" x="60"  y="190" width="150" height="150"/>
  <rect class="sub" x="210" y="190" width="150" height="150"/>

  <!-- top-left quadrant subdivided (medium density) -->
  <rect class="sub" x="60"  y="40"  width="75" height="75"/>
  <rect class="sub" x="135" y="40"  width="75" height="75"/>
  <rect class="sub" x="60"  y="115" width="75" height="75"/>

  <!-- dense block: subdivided into 4 fine cells, searched ones highlighted -->
  <rect class="sub" x="135"   y="115"   width="37.5" height="37.5"/>
  <rect class="hl"  x="172.5" y="115"   width="37.5" height="37.5"/>
  <rect class="hl"  x="135"   y="152.5" width="37.5" height="37.5"/>
  <rect class="hl"  x="172.5" y="152.5" width="37.5" height="37.5" stroke-width="3"/>

  <!-- outer border -->
  <rect x="60" y="40" width="300" height="300" fill="none" stroke="#3a47b8" stroke-width="2.5"/>

  <!-- scattered drivers -->
  <circle class="drv" cx="270" cy="95"  r="3.5"/>
  <circle class="drv" cx="320" cy="150" r="3.5"/>
  <circle class="drv" cx="110" cy="250" r="3.5"/>
  <circle class="drv" cx="170" cy="300" r="3.5"/>
  <circle class="drv" cx="290" cy="280" r="3.5"/>
  <circle class="drv" cx="95"  cy="70"  r="3.5"/>
  <circle class="drv" cx="180" cy="70"  r="3.5"/>
  <circle class="drv" cx="155" cy="135" r="3.5"/>
  <circle class="drv" cx="188" cy="130" r="3.5"/>
  <circle class="drv" cx="150" cy="170" r="3.5"/>
  <circle class="drv" cx="200" cy="160" r="3.5"/>

  <!-- order point -->
  <circle cx="191" cy="171" r="7" fill="#3a47b8"/>
  <circle cx="191" cy="171" r="11" fill="none" stroke="#3a47b8" stroke-width="2"/>
  <text x="191" y="210" class="ts">pedido</text>

  <!-- legend -->
  <rect class="hl" x="430" y="70" width="22" height="22"/>
  <text x="462" y="86" class="capl">celda del pedido y sus vecinas (zona de búsqueda)</text>

  <rect class="sub" x="430" y="106" width="22" height="22"/>
  <text x="462" y="122" class="capl">otras celdas del índice</text>

  <circle class="drv" cx="441" cy="153" r="4"/>
  <text x="462" y="157" class="capl">conductor disponible</text>

  <circle cx="441" cy="187" r="6" fill="#3a47b8"/>
  <text x="462" y="191" class="capl">origen del pedido</text>

  <text x="430" y="235" class="capl" font-weight="700" fill="#3a47b8">¿Cómo busca?</text>
  <text x="430" y="255" class="capl">1. Las zonas densas se subdividen en celdas más finas.</text>
  <text x="430" y="273" class="capl">2. Se localiza la celda que contiene el pedido.</text>
  <text x="430" y="291" class="capl">3. Se consultan esa celda y las adyacentes.</text>
  <text x="430" y="309" class="capl">4. Se ordenan los candidatos por ETA / distancia.</text>
</svg>
