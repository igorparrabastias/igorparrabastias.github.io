<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 190" font-family="system-ui, sans-serif" role="img" aria-label="Los caracteres son números: la A es 65 en ASCII; el euro es un code point Unicode codificado en UTF-8">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .bd{fill:#3a47b8}
    .glyph{font-size:22px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .mono{font-size:14px;font-weight:700;fill:#3a47b8;text-anchor:middle;font-family:ui-monospace,monospace}
    .monow{font-size:13px;font-weight:700;fill:#fff;text-anchor:middle;font-family:ui-monospace,monospace}
    .lab{font-size:11px;fill:#888;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:12px;fill:#666;text-anchor:middle}
  </style>
  <rect width="620" height="190" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="310" y="26">Cada carácter es un número</text>

  <!-- fila ASCII -->
  <rect class="box" x="40" y="45" width="56" height="40" rx="6"/><text class="glyph" x="68" y="72">A</text>
  <line class="fl" x1="96" y1="65" x2="150" y2="65" marker-end="url(#a)"/>
  <rect class="box" x="150" y="45" width="110" height="40" rx="6"/><text class="mono" x="205" y="70">65</text><text class="lab" x="205" y="100">ASCII</text>
  <line class="fl" x1="260" y1="65" x2="314" y2="65" marker-end="url(#a)"/>
  <rect class="bd" x="314" y="45" width="160" height="40" rx="6"/><text class="monow" x="394" y="70">0100 0001</text>

  <!-- fila Unicode -->
  <rect class="box" x="40" y="115" width="56" height="40" rx="6"/><text class="glyph" x="68" y="142">€</text>
  <line class="fl" x1="96" y1="135" x2="150" y2="135" marker-end="url(#a)"/>
  <rect class="box" x="150" y="115" width="110" height="40" rx="6"/><text class="mono" x="205" y="140">U+20AC</text><text class="lab" x="205" y="170">Unicode</text>
  <line class="fl" x1="260" y1="135" x2="314" y2="135" marker-end="url(#a)"/>
  <rect class="bd" x="314" y="115" width="220" height="40" rx="6"/><text class="monow" x="424" y="140">E2 82 AC</text>
  <text class="lab" x="424" y="170">UTF-8 (3 bytes)</text>

  <text class="lab" x="205" y="40">↓ code point</text>
</svg>
