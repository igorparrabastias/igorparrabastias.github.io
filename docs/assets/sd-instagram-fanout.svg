<svg width="1440" height="720" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="system-ui, sans-serif" role="img" aria-label="Comparacion fan-out on write versus fan-out on read: a la izquierda, al publicar se escribe el post en el timeline de cada seguidor, rapido al leer pero caro al escribir; a la derecha, al abrir el feed se consultan las publicaciones de los seguidos y se mezclan, barato al escribir pero caro al leer">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .sub{fill:#ffffff;stroke:#3a47b8;stroke-width:1.5}
    .col{fill:#f6f7fd;stroke:#c9cfee;stroke-width:1.5}
    .t{font-size:13px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .ts{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2.5;fill:none}
    .life{stroke:#c9cfee;stroke-width:1.5;stroke-dasharray:4 4}
  </style>
  <rect width="720" height="360" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0c8"/></marker></defs>

  <!-- Columna izquierda: fan-out on write -->
  <rect class="col" x="16" y="16" width="332" height="328" rx="10"/>
  <text class="t" x="182" y="38">Fan-out on write (push)</text>
  <text class="cap" x="182" y="54">al publicar se reparte a cada seguidor</text>

  <rect class="box" x="132" y="66" width="100" height="34" rx="10"/>
  <text class="ts" x="182" y="87">Autor publica</text>

  <line class="fl" x1="182" y1="100" x2="182" y2="126" marker-end="url(#a)"/>

  <rect class="sub" x="40" y="128" width="284" height="30" rx="10"/>
  <text class="ts" x="182" y="147">Fan-out worker escribe en N timelines</text>

  <line class="fl" x1="80"  y1="158" x2="80"  y2="186" marker-end="url(#a)"/>
  <line class="fl" x1="182" y1="158" x2="182" y2="186" marker-end="url(#a)"/>
  <line class="fl" x1="284" y1="158" x2="284" y2="186" marker-end="url(#a)"/>

  <rect class="sub" x="44"  y="188" width="72" height="30" rx="10"/>
  <text class="ts" x="80"  y="207">Timeline 1</text>
  <rect class="sub" x="146" y="188" width="72" height="30" rx="10"/>
  <text class="ts" x="182" y="207">Timeline 2</text>
  <rect class="sub" x="248" y="188" width="72" height="30" rx="10"/>
  <text class="ts" x="284" y="207">Timeline N</text>

  <line class="fl" x1="80"  y1="218" x2="80"  y2="246" marker-end="url(#a)"/>
  <line class="fl" x1="182" y1="218" x2="182" y2="246" marker-end="url(#a)"/>
  <line class="fl" x1="284" y1="218" x2="284" y2="246" marker-end="url(#a)"/>

  <rect class="box" x="60" y="248" width="244" height="30" rx="10"/>
  <text class="ts" x="182" y="267">Seguidor lee feed ya armado</text>

  <text class="cap" x="182" y="300">rapido al leer (lista lista)</text>
  <text class="cap" x="182" y="316">caro al escribir, malo para celebridades</text>

  <!-- Columna derecha: fan-out on read -->
  <rect class="col" x="372" y="16" width="332" height="328" rx="10"/>
  <text class="t" x="538" y="38">Fan-out on read (pull)</text>
  <text class="cap" x="538" y="54">al abrir el feed se mezcla al vuelo</text>

  <rect class="box" x="488" y="66" width="100" height="34" rx="10"/>
  <text class="ts" x="538" y="87">Autor publica</text>

  <line class="fl" x1="538" y1="100" x2="538" y2="126" marker-end="url(#a)"/>

  <rect class="sub" x="396" y="128" width="284" height="30" rx="10"/>
  <text class="ts" x="538" y="147">Solo se guarda el post (1 escritura)</text>

  <rect class="box" x="488" y="186" width="100" height="32" rx="10"/>
  <text class="ts" x="538" y="206">Lector abre feed</text>

  <line class="fl" x1="488" y1="202" x2="416" y2="246" marker-end="url(#a)"/>
  <line class="fl" x1="538" y1="218" x2="538" y2="246" marker-end="url(#a)"/>
  <line class="fl" x1="588" y1="202" x2="660" y2="246" marker-end="url(#a)"/>

  <rect class="sub" x="400" y="248" width="78" height="30" rx="10"/>
  <text class="ts" x="439" y="267">Posts seg. A</text>
  <rect class="sub" x="499" y="248" width="78" height="30" rx="10"/>
  <text class="ts" x="538" y="267">Posts seg. B</text>
  <rect class="sub" x="598" y="248" width="78" height="30" rx="10"/>
  <text class="ts" x="637" y="267">Posts seg. N</text>

  <text class="cap" x="538" y="300">barato al escribir (1 sola escritura)</text>
  <text class="cap" x="538" y="316">caro al leer: consultar y mezclar muchas fuentes</text>
</svg>
