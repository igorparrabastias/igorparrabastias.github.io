<svg width="1280" height="440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" font-family="system-ui, sans-serif" role="img" aria-label="RAG: la pregunta recupera documentos relevantes de una base vectorial, que se añaden al prompt antes de generar la respuesta">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .db{fill:#dfe3f7;stroke:#3a47b8;stroke-width:2}
    .bd{fill:#3a47b8}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .tw{font-size:12px;font-weight:700;fill:#fff;text-anchor:middle}
    .sub{font-size:10px;fill:#888;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
  </style>
  <rect width="640" height="220" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="320" y="28">RAG: darle al modelo documentos antes de responder</text>

  <rect class="box" x="30"  y="80" width="95" height="44" rx="8"/><text class="t" x="77" y="106">pregunta</text>
  <rect class="db"  x="180" y="70" width="120" height="64" rx="8"/><text class="t" x="240" y="95">base vectorial</text><text class="sub" x="240" y="113">busca por</text><text class="sub" x="240" y="126">significado</text>
  <rect class="box" x="355" y="80" width="120" height="44" rx="8"/><text class="t" x="415" y="100">docs + pregunta</text><text class="sub" x="415" y="116">(prompt aumentado)</text>
  <rect class="bd"  x="530" y="80" width="90" height="44" rx="8"/><text class="tw" x="575" y="100">LLM</text><text class="sub" x="575" y="116" fill="#cfd3e8">respuesta</text>

  <line class="fl" x1="125" y1="102" x2="180" y2="102" marker-end="url(#a)"/>
  <line class="fl" x1="300" y1="102" x2="355" y2="102" marker-end="url(#a)"/>
  <line class="fl" x1="475" y1="102" x2="530" y2="102" marker-end="url(#a)"/>

  <text class="cap" x="320" y="170">El modelo responde con conocimiento EXTERNO y actualizado, sin reentrenarlo —</text>
  <text class="cap" x="320" y="188" fill="#3a47b8">y puede citar la fuente, lo que reduce las alucinaciones.</text>
</svg>
