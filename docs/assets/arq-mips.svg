<svg width="1240" height="440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" font-family="system-ui, sans-serif" role="img" aria-label="Dos máquinas con los mismos MIPS pueden tardar muy distinto en un programa real">
  <style>
    .barA{fill:#3a47b8}
    .barB{fill:#7782d6}
    .ax{stroke:#cfd3e8;stroke-width:1.5}
    .lbl{font-size:12px;font-weight:700;fill:#333;text-anchor:middle}
    .val{font-size:12px;fill:#666;text-anchor:middle}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:12px;fill:#666;text-anchor:middle}
  </style>
  <rect width="620" height="220" fill="#ffffff"/>
  <text class="ttl" x="310" y="28">Mismos MIPS, distinto tiempo real</text>

  <!-- panel izq: MIPS iguales -->
  <text class="lbl" x="160" y="55">MIPS (en el papel)</text>
  <line class="ax" x1="70" y1="160" x2="280" y2="160"/>
  <rect class="barA" x="100" y="80" width="50" height="80"/><text class="lbl" x="125" y="178">Máq. A</text>
  <rect class="barB" x="200" y="80" width="50" height="80"/><text class="lbl" x="225" y="178">Máq. B</text>
  <text class="val" x="175" y="75">iguales</text>

  <line class="ax" x1="310" y1="50" x2="310" y2="190" stroke="#e6e6ef"/>

  <!-- panel der: tiempo real -->
  <text class="lbl" x="460" y="55">Tiempo en un programa real</text>
  <line class="ax" x1="360" y1="160" x2="580" y2="160"/>
  <rect class="barA" x="395" y="100" width="50" height="60"/><text class="lbl" x="420" y="178">Máq. A</text>
  <rect class="barB" x="495" y="70"  width="50" height="90"/><text class="lbl" x="520" y="178">Máq. B</text>
  <text class="val" x="420" y="95">rápida</text>
  <text class="val" x="520" y="63">lenta</text>

  <text class="cap" x="310" y="208">No todas las instrucciones cuestan igual → mejor fiarse de benchmarks que de un número suelto.</text>
</svg>
