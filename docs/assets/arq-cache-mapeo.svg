<svg width="1240" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 250" font-family="system-ui, sans-serif" role="img" aria-label="Mapeo de caché: directo (un único hueco), asociativo por conjuntos y totalmente asociativo">
  <style>
    .slot{fill:#eef0fb;stroke:#3a47b8;stroke-width:1.5}
    .blk{fill:#3a47b8}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .lbl{font-size:11px;fill:#666;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:1.8;fill:none}
    .cap{font-size:12px;fill:#666;text-anchor:middle}
  </style>
  <rect width="620" height="250" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>

  <!-- bloque a colocar -->
  <text class="lbl" x="60" y="40">bloque</text>
  <rect class="blk" x="40" y="45" width="44" height="26" rx="4"/>

  <!-- Directo -->
  <text class="t" x="175" y="40">Directo</text>
  <g>
    <rect class="slot" x="150" y="55" width="50" height="22"/>
    <rect class="slot" x="150" y="79" width="50" height="22" stroke="#e0663f"/>
    <rect class="slot" x="150" y="103" width="50" height="22"/>
    <rect class="slot" x="150" y="127" width="50" height="22"/>
  </g>
  <line class="fl" x1="84" y1="60" x2="150" y2="88" marker-end="url(#a)"/>
  <text class="lbl" x="175" y="170">un único hueco</text>
  <text class="lbl" x="175" y="186">posible</text>

  <!-- Asociativo por conjuntos -->
  <text class="t" x="350" y="40">Por conjuntos</text>
  <g>
    <rect class="slot" x="310" y="55" width="44" height="22"/><rect class="slot" x="356" y="55" width="44" height="22"/>
    <rect class="slot" x="310" y="79" width="44" height="22" stroke="#e0663f"/><rect class="slot" x="356" y="79" width="44" height="22" stroke="#e0663f"/>
    <rect class="slot" x="310" y="103" width="44" height="22"/><rect class="slot" x="356" y="103" width="44" height="22"/>
  </g>
  <line class="fl" x1="84" y1="60" x2="310" y2="88" marker-end="url(#a)"/>
  <text class="lbl" x="355" y="170">un conjunto;</text>
  <text class="lbl" x="355" y="186">varios huecos</text>

  <!-- Totalmente asociativo -->
  <text class="t" x="530" y="40">Totalmente</text>
  <g>
    <rect class="slot" x="490" y="55" width="40" height="22" stroke="#e0663f"/><rect class="slot" x="532" y="55" width="40" height="22" stroke="#e0663f"/>
    <rect class="slot" x="490" y="79" width="40" height="22" stroke="#e0663f"/><rect class="slot" x="532" y="79" width="40" height="22" stroke="#e0663f"/>
    <rect class="slot" x="490" y="103" width="40" height="22" stroke="#e0663f"/><rect class="slot" x="532" y="103" width="40" height="22" stroke="#e0663f"/>
  </g>
  <line class="fl" x1="84" y1="60" x2="490" y2="78" marker-end="url(#a)"/>
  <text class="lbl" x="531" y="170">cualquier hueco</text>

  <text class="cap" x="310" y="222">Más flexibilidad → menos colisiones, pero más caro de buscar. El equilibrio real: por conjuntos.</text>
  <text class="cap" x="310" y="240" fill="#888">(en rojo, los huecos donde PUEDE ir el bloque)</text>
</svg>
