<svg width="1280" height="460" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230" font-family="system-ui, sans-serif" role="img" aria-label="Inferencia autorregresiva: el modelo genera un token, lo añade a la entrada y repite; la caché KV evita recalcular">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:1.5}
    .bd{fill:#3a47b8}
    .new{fill:#f3d7cb;stroke:#e0663f;stroke-width:1.5}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .tw{font-size:12px;font-weight:700;fill:#fff;text-anchor:middle}
    .to{font-size:12px;font-weight:700;fill:#e0663f;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:1.8;fill:none}
    .ret{stroke:#e0663f;stroke-width:2;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
  </style>
  <rect width="640" height="230" fill="#ffffff"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#e0663f"/></marker>
  </defs>
  <text class="ttl" x="320" y="28">Generar es caro: un token cada vez</text>

  <rect class="box" x="40"  y="75" width="170" height="40" rx="6"/><text class="t" x="125" y="100">"el gato se subió al"</text>
  <rect class="bd"  x="270" y="73" width="90"  height="44" rx="8"/><text class="tw" x="315" y="100">LLM</text>
  <rect class="new" x="420" y="75" width="120" height="40" rx="6"/><text class="to" x="480" y="100">"árbol"</text>

  <line class="fl" x1="210" y1="95" x2="270" y2="95" marker-end="url(#a)"/>
  <line class="fl" x1="360" y1="95" x2="420" y2="95" marker-end="url(#a)"/>

  <!-- realimentación: el token generado vuelve a la entrada -->
  <path class="ret" d="M 480 115 L 480 160 L 125 160 L 125 115" marker-end="url(#ar)"/>
  <text class="cap" x="300" y="180" fill="#e0663f">cada token generado se añade a la entrada y se vuelve a pasar (autorregresivo)</text>

  <text class="cap" x="320" y="208">La caché KV guarda los cálculos previos para no rehacerlos en cada paso — aun así, generar 1000</text>
  <text class="cap" x="320" y="223">tokens son 1000 pasadas por el modelo.</text>
</svg>
