<svg width="1240" height="440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" font-family="system-ui, sans-serif" role="img" aria-label="Por qué evaluar es difícil: los benchmarks se saturan cerca del 100% y la contaminación de datos hace que el modelo recuerde en vez de razonar">
  <style>
    .axis{stroke:#9aa0c8;stroke-width:1.5}
    .curve{fill:none;stroke:#3a47b8;stroke-width:2.5}
    .sat{stroke:#e0663f;stroke-width:1.5;stroke-dasharray:4 3}
    .t{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .lbl{font-size:10px;fill:#666;text-anchor:middle}
    .warn{font-size:10px;font-weight:700;fill:#e0663f;text-anchor:middle}
  </style>
  <rect width="620" height="220" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="310" y="26">Por qué evaluar se ha vuelto difícil</text>

  <!-- saturación -->
  <text class="t" x="160" y="50">saturación</text>
  <line class="axis" x1="55" y1="160" x2="280" y2="160"/>
  <line class="axis" x1="55" y1="60" x2="55" y2="160"/>
  <line class="sat" x1="55" y1="72" x2="280" y2="72"/>
  <text class="warn" x="245" y="68">100%</text>
  <path class="curve" d="M55,150 C120,100 200,78 275,75"/>
  <text class="lbl" x="165" y="180">cuando todos rondan el 90%,</text>
  <text class="lbl" x="165" y="194">el test deja de distinguir</text>

  <line x1="320" y1="45" x2="320" y2="195" stroke="#ccc" stroke-width="1"/>

  <!-- contaminación -->
  <text class="t" x="470" y="50">contaminación de datos</text>
  <rect x="355" y="70" width="100" height="40" rx="6" fill="#eef0fb" stroke="#3a47b8" stroke-width="2"/><text class="t" x="405" y="88" font-size="10">internet</text><text class="lbl" x="405" y="103">(entrenamiento)</text>
  <rect x="500" y="70" width="100" height="40" rx="6" fill="#fbeee9" stroke="#e0663f" stroke-width="2"/><text class="t" x="550" y="88" font-size="10" fill="#e0663f">el examen</text><text class="lbl" x="550" y="103">+ respuestas</text>
  <path d="M455,90 C475,90 480,90 500,90" fill="none" stroke="#e0663f" stroke-width="2" stroke-dasharray="3 2" marker-end="url(#a)"/>
  <text class="warn" x="478" y="138">el examen ya estaba dentro</text>
  <text class="lbl" x="478" y="158">el modelo no razona:</text>
  <text class="warn" x="478" y="174">recuerda</text>

  <text class="cap" x="310" y="212">Distinguir comprensión genuina de memorización obliga a renovar las pruebas sin parar.</text>
</svg>
