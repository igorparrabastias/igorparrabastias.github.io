<svg width="1200" height="440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" font-family="system-ui, sans-serif" role="img" aria-label="Datacenters en el espacio: satélites con paneles solares y chips en órbita, con sol casi continuo y frío para disipar calor">
  <style>
    .t{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .lbl{font-size:10px;fill:#666;text-anchor:middle}
    .panel{fill:#3a47b8}
    .body{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .orbit{fill:none;stroke:#aab0dd;stroke-width:1.5;stroke-dasharray:4 4}
  </style>
  <rect width="600" height="220" fill="#ffffff"/>
  <text class="ttl" x="300" y="24">Llevar el cómputo a la órbita</text>

  <!-- Sol -->
  <g transform="translate(62,56)">
    <circle r="12" fill="#e0663f"/>
    <g stroke="#e0663f" stroke-width="2"><line x1="0" y1="-19" x2="0" y2="-15"/><line x1="0" y1="15" x2="0" y2="19"/><line x1="-19" y1="0" x2="-15" y2="0"/><line x1="15" y1="0" x2="19" y2="0"/><line x1="-13" y1="-13" x2="-10" y2="-10"/><line x1="10" y1="10" x2="13" y2="13"/><line x1="13" y1="-13" x2="10" y2="-10"/><line x1="-10" y1="10" x2="-13" y2="13"/></g>
  </g>
  <text class="lbl" x="62" y="92">sol casi continuo</text>

  <!-- Tierra -->
  <circle cx="68" cy="138" r="30" fill="#cdd9ec" stroke="#3a47b8" stroke-width="2"/>
  <path d="M50,128 q11,-5 22,2 q8,5 18,0 M46,145 q14,6 27,0 q10,-5 20,2" fill="none" stroke="#7aa05a" stroke-width="2.5" opacity="0.6"/>
  <text class="lbl" x="68" y="180">Tierra</text>

  <ellipse class="orbit" cx="350" cy="105" rx="200" ry="56"/>

  <!-- satélite -->
  <g transform="translate(420,58)">
    <rect class="panel" x="-58" y="-6" width="40" height="20"/>
    <rect class="panel" x="18" y="-6" width="40" height="20"/>
    <rect class="body" x="-16" y="-14" width="32" height="36" rx="4"/>
    <text class="t" x="0" y="7" font-size="9">chips</text>
  </g>
  <text class="lbl" x="420" y="36">satélite con paneles solares</text>

  <text class="cap" x="320" y="192">Suncatcher (Google, TPU) y Starcloud (GPU H100) son demostraciones de 2025–2027.</text>
  <text class="cap" x="320" y="209">Frenos: lanzar masa es caro, la radiación degrada los chips, reparar allí es casi imposible.</text>
</svg>
