<svg width="1280" height="560" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" font-family="system-ui, sans-serif" role="img" aria-label="Entrenamiento distribuido: el modelo y los datos repartidos entre muchas GPUs, escalar arriba y a los lados">
  <style>
    .gpu{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .core{fill:#3a47b8}
    .t{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .ttl{font-size:12px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:12px;fill:#666}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .ax{stroke:#e0663f;stroke-width:2;fill:none}
    .axl{font-size:11px;font-weight:700;fill:#e0663f}
  </style>
  <rect width="640" height="280" fill="#ffffff"/>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0c8"/></marker>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#e0663f"/></marker>
  </defs>

  <text class="ttl" x="320" y="30">Un modelo, repartido entre miles de GPUs</text>

  <!-- grid of GPUs -->
  <g>
    <!-- row 1 -->
    <rect class="gpu" x="120" y="60" width="64" height="46" rx="6"/><text class="t" x="152" y="88">GPU</text>
    <rect class="gpu" x="200" y="60" width="64" height="46" rx="6"/><text class="t" x="232" y="88">GPU</text>
    <rect class="gpu" x="280" y="60" width="64" height="46" rx="6"/><text class="t" x="312" y="88">GPU</text>
    <rect class="gpu" x="360" y="60" width="64" height="46" rx="6"/><text class="t" x="392" y="88">GPU</text>
    <!-- row 2 -->
    <rect class="gpu" x="120" y="120" width="64" height="46" rx="6"/><text class="t" x="152" y="148">GPU</text>
    <rect class="gpu" x="200" y="120" width="64" height="46" rx="6"/><text class="t" x="232" y="148">GPU</text>
    <rect class="gpu" x="280" y="120" width="64" height="46" rx="6"/><text class="t" x="312" y="148">GPU</text>
    <rect class="gpu" x="360" y="120" width="64" height="46" rx="6"/><text class="t" x="392" y="148">GPU</text>
  </g>
  <!-- interconnect lines -->
  <line class="fl" x1="184" y1="83" x2="200" y2="83"/>
  <line class="fl" x1="264" y1="83" x2="280" y2="83"/>
  <line class="fl" x1="344" y1="83" x2="360" y2="83"/>
  <line class="fl" x1="184" y1="143" x2="200" y2="143"/>
  <line class="fl" x1="264" y1="143" x2="280" y2="143"/>
  <line class="fl" x1="344" y1="143" x2="360" y2="143"/>
  <line class="fl" x1="152" y1="106" x2="152" y2="120"/>
  <line class="fl" x1="232" y1="106" x2="232" y2="120"/>
  <line class="fl" x1="312" y1="106" x2="312" y2="120"/>
  <line class="fl" x1="392" y1="106" x2="392" y2="120"/>

  <!-- escalar arriba (más potencia por nodo) -->
  <line class="ax" x1="470" y1="166" x2="470" y2="60" marker-end="url(#ao)"/>
  <text class="axl" x="478" y="110">escalar ↑</text>
  <text class="cap" x="478" y="128" font-size="10">(entrenar)</text>
  <!-- escalar a los lados (servir) -->
  <line class="ax" x1="120" y1="200" x2="424" y2="200" marker-end="url(#ao)"/>
  <text class="axl" x="230" y="222">escalar → a los lados</text>
  <text class="cap" x="230" y="238" font-size="10">(servir a millones)</text>

  <text class="cap" x="120" y="265">Vive en la nube (GCP, AWS…). La factura se mide en gigavatios y litros de agua.</text>
</svg>
