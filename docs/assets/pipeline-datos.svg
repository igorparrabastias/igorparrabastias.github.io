<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 200" font-family="system-ui, sans-serif" role="img" aria-label="Pipeline de datos: recolección, limpieza, deduplicación, etiquetado, curación, modelo">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .last{fill:#3a47b8;stroke:#3a47b8;stroke-width:2}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .tw{font-size:12px;font-weight:700;fill:#fff;text-anchor:middle}
    .sub{font-size:10px;fill:#888;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2.5;fill:none}
    .cap{font-size:12px;fill:#666}
  </style>
  <rect width="660" height="200" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0c8"/></marker></defs>

  <rect class="box"  x="20"  y="60" width="92" height="50" rx="8"/><text class="t" x="66"  y="82">Recolección</text><text class="sub" x="66" y="99">web, libros…</text>
  <rect class="box"  x="135" y="60" width="92" height="50" rx="8"/><text class="t" x="181" y="82">Limpieza</text><text class="sub" x="181" y="99">ruido, HTML</text>
  <rect class="box"  x="250" y="60" width="92" height="50" rx="8"/><text class="t" x="296" y="88">Dedup.</text>
  <rect class="box"  x="365" y="60" width="92" height="50" rx="8"/><text class="t" x="411" y="82">Etiquetado</text><text class="sub" x="411" y="99">+ curación</text>
  <rect class="last" x="495" y="55" width="120" height="60" rx="10"/><text class="tw" x="555" y="82">MODELO</text><text class="sub" x="555" y="99" fill="#cfd3e8">aprende patrones</text>

  <line class="fl" x1="112" y1="85" x2="135" y2="85" marker-end="url(#a)"/>
  <line class="fl" x1="227" y1="85" x2="250" y2="85" marker-end="url(#a)"/>
  <line class="fl" x1="342" y1="85" x2="365" y2="85" marker-end="url(#a)"/>
  <line class="fl" x1="457" y1="85" x2="495" y2="85" marker-end="url(#a)"/>

  <text class="cap" x="20" y="150">Basura entra → basura sale. La calidad y la diversidad pesan tanto como el tamaño.</text>
  <text class="cap" x="20" y="172" fill="#e0663f">El modelo hereda también los sesgos y errores de estos datos.</text>
</svg>
