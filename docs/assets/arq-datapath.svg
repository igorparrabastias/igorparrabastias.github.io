<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 290" font-family="system-ui, sans-serif" role="img" aria-label="Camino de datos: registros hacia la ALU y de vuelta, con memoria y la unidad de control">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .ctrl{fill:#3a47b8;stroke:#3a47b8;stroke-width:2}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .tw{font-size:12px;font-weight:700;fill:#fff;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2.5;fill:none}
    .sig{stroke:#e0663f;stroke-width:1.8;fill:none;stroke-dasharray:4 3}
    .cap{font-size:12px;fill:#666}
  </style>
  <rect width="640" height="290" fill="#ffffff"/>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0c8"/></marker>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#e0663f"/></marker>
  </defs>

  <!-- Unidad de control -->
  <rect class="ctrl" x="200" y="30" width="240" height="36" rx="8"/><text class="tw" x="320" y="53">Unidad de control</text>

  <!-- Banco de registros -->
  <rect class="box" x="40" y="120" width="120" height="90" rx="8"/><text class="t" x="100" y="170">Banco de<tspan x="100" dy="16">registros</tspan></text>

  <!-- ALU -->
  <polygon class="box" points="280,120 360,120 380,165 360,210 280,210 300,165"/>
  <text class="t" x="335" y="170">ALU</text>

  <!-- Memoria de datos -->
  <rect class="box" x="490" y="120" width="110" height="90" rx="8"/><text class="t" x="545" y="170">Memoria</text>

  <!-- registros -> ALU (dos operandos) -->
  <line class="fl" x1="160" y1="145" x2="300" y2="145" marker-end="url(#a)"/>
  <line class="fl" x1="160" y1="185" x2="300" y2="185" marker-end="url(#a)"/>
  <!-- ALU -> memoria -->
  <line class="fl" x1="380" y1="165" x2="490" y2="165" marker-end="url(#a)"/>
  <!-- memoria/ALU resultado de vuelta a registros (bus superior) -->
  <path class="fl" d="M 545 120 L 545 95 L 100 95 L 100 120" marker-end="url(#a)"/>
  <text class="cap" x="250" y="89">resultado de vuelta a los registros</text>

  <!-- señales de control (punteadas) -->
  <line class="sig" x1="100" y1="66" x2="100" y2="118" marker-end="url(#ao)"/>
  <line class="sig" x1="335" y1="66" x2="335" y2="118" marker-end="url(#ao)"/>
  <line class="sig" x1="545" y1="66" x2="545" y2="118" marker-end="url(#ao)"/>

  <text class="cap" x="40" y="265">Línea continua = datos  ·  punteada naranja = señales de control que abren cada "compuerta".</text>
</svg>
