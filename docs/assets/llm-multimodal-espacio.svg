<svg width="1240" height="480" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 240" font-family="system-ui, sans-serif" role="img" aria-label="Espacio compartido: texto, imagen y audio se proyectan al mismo espacio de embeddings, donde lo que significa lo mismo queda cerca">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .space{fill:#f6f7fc;stroke:#3a47b8;stroke-width:1.5;stroke-dasharray:5 4}
    .dot{fill:#3a47b8}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .lbl{font-size:11px;fill:#333;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
  </style>
  <rect width="620" height="240" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="310" y="28">Un espacio común para texto, imagen y audio</text>

  <rect class="box" x="40" y="55"  width="120" height="34" rx="6"/><text class="t" x="100" y="77">texto: "un gato"</text>
  <rect class="box" x="40" y="103" width="120" height="34" rx="6"/><text class="t" x="100" y="125">imagen de gato</text>
  <rect class="box" x="40" y="151" width="120" height="34" rx="6"/><text class="t" x="100" y="173">audio "miau"</text>

  <!-- espacio compartido -->
  <ellipse class="space" cx="450" cy="120" rx="130" ry="85"/>
  <text class="lbl" x="450" y="55" fill="#888">espacio de embeddings</text>
  <!-- conceptos cercanos -->
  <circle class="dot" cx="430" cy="110" r="5"/><text class="lbl" x="430" y="100" font-size="10">gato</text>
  <circle class="dot" cx="455" cy="125" r="5"/>
  <circle class="dot" cx="442" cy="138" r="5"/>
  <circle class="dot" cx="520" cy="160" r="5" fill="#aab0dd"/><text class="lbl" x="520" y="152" font-size="10" fill="#888">perro</text>

  <line class="fl" x1="160" y1="72"  x2="330" y2="110" marker-end="url(#a)"/>
  <line class="fl" x1="160" y1="120" x2="330" y2="120" marker-end="url(#a)"/>
  <line class="fl" x1="160" y1="168" x2="330" y2="132" marker-end="url(#a)"/>

  <text class="cap" x="310" y="225">Lo que significa lo mismo cae CERCA, sea cual sea su forma — la base de la IA multimodal.</text>
</svg>
