<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 215" font-family="system-ui, sans-serif" role="img" aria-label="El debate entre escalar más cómputo y datos, con rendimientos decrecientes, o buscar nuevas ideas arquitectónicas">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .t{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .lbl{font-size:10px;fill:#666;text-anchor:middle}
    .axis{stroke:#9aa0c8;stroke-width:1.5}
    .curve{fill:none;stroke:#3a47b8;stroke-width:2.5}
  </style>
  <rect width="620" height="215" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="310" y="26">¿Más cómputo, o ideas nuevas?</text>

  <!-- escalar -->
  <text class="t" x="160" y="52">escalar: rendimientos decrecientes</text>
  <line class="axis" x1="55" y1="160" x2="270" y2="160"/>
  <line class="axis" x1="55" y1="60" x2="55" y2="160"/>
  <path class="curve" d="M55,150 C100,90 180,75 265,72"/>
  <text class="lbl" x="160" y="180">más datos y cómputo → cada vez menos mejora</text>

  <line x1="310" y1="45" x2="310" y2="190" stroke="#ccc" stroke-width="1"/>

  <!-- nuevas ideas -->
  <text class="t" x="465" y="52">nuevas ideas</text>
  <rect class="box" x="350" y="72" width="100" height="32" rx="6"/><text class="t" x="400" y="92" font-size="10">razonamiento</text>
  <rect class="box" x="350" y="114" width="100" height="32" rx="6"/><text class="t" x="400" y="134" font-size="10">MoE</text>
  <rect class="box" x="480" y="93" width="110" height="32" rx="6" stroke="#e0663f"/><text class="t" x="535" y="113" font-size="10" fill="#e0663f">mejor uso del cómputo</text>
  <line class="fl" x1="450" y1="88"  x2="480" y2="106" marker-end="url(#a)" stroke="#9aa0c8" stroke-width="2" fill="none"/>
  <line class="fl" x1="450" y1="130" x2="480" y2="113" marker-end="url(#a)" stroke="#9aa0c8" stroke-width="2" fill="none"/>

  <text class="cap" x="310" y="205">La realidad: ambas conviven. El escalado ayuda, pero las innovaciones aportan lo que el tamaño ya no daba.</text>
</svg>
