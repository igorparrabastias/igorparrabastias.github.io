<svg width="1280" height="440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" font-family="system-ui, sans-serif" role="img" aria-label="De loro estadístico a asistente: preentrenamiento, ajuste por instrucciones y RLHF con modelo de recompensa">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2}
    .bd{fill:#3a47b8}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .tw{font-size:12px;font-weight:700;fill:#fff;text-anchor:middle}
    .sub{font-size:10px;fill:#888;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2.5;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
  </style>
  <rect width="640" height="220" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="320" y="30">De "loro estadístico" a asistente útil</text>

  <rect class="box" x="25"  y="65" width="135" height="60" rx="8"/><text class="t" x="92" y="90">1 · Preentreno</text><text class="sub" x="92" y="108">predice el sig. token</text>
  <rect class="box" x="190" y="65" width="135" height="60" rx="8"/><text class="t" x="257" y="90">2 · Instrucciones</text><text class="sub" x="257" y="108">ejemplos (SFT)</text>
  <rect class="box" x="355" y="65" width="135" height="60" rx="8"/><text class="t" x="422" y="84">3 · Recompensa</text><text class="sub" x="422" y="102">humanos comparan</text><text class="sub" x="422" y="116">respuestas</text>
  <rect class="bd"  x="520" y="65" width="100" height="60" rx="8"/><text class="tw" x="570" y="90">4 · RLHF</text><text class="sub" x="570" y="108" fill="#cfd3e8">ajusta con RL</text>

  <line class="fl" x1="160" y1="95" x2="190" y2="95" marker-end="url(#a)"/>
  <line class="fl" x1="325" y1="95" x2="355" y2="95" marker-end="url(#a)"/>
  <line class="fl" x1="490" y1="95" x2="520" y2="95" marker-end="url(#a)"/>

  <text class="cap" x="320" y="170">El preentreno da conocimiento; los pasos 2–4 lo vuelven obediente, honesto y seguro.</text>
  <text class="cap" x="320" y="190" fill="#3a47b8">Es lo que separó a GPT-3 (potente pero crudo) de ChatGPT (útil para cualquiera).</text>
</svg>
