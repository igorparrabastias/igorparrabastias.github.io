<svg width="1280" height="440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" font-family="system-ui, sans-serif" role="img" aria-label="Cuantización: comprimir los pesos de 32 bits a 8 o 4 bits para que el modelo quepa en hardware modesto">
  <style>
    .big{fill:#3a47b8}
    .med{fill:#7782d6}
    .small{fill:#aab0dd}
    .tw{font-size:13px;font-weight:700;fill:#fff;text-anchor:middle}
    .lbl{font-size:12px;font-weight:700;fill:#333;text-anchor:middle}
    .sub{font-size:11px;fill:#888;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
  </style>
  <rect width="640" height="220" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <text class="ttl" x="320" y="30">Cuantización: el mismo modelo, menos bits por peso</text>

  <rect class="big" x="60"  y="70" width="150" height="60" rx="6"/><text class="tw" x="135" y="98">FP32</text><text class="tw" x="135" y="116" font-size="10">32 bits/peso</text>
  <text class="lbl" x="135" y="150">original</text>
  <text class="sub" x="135" y="167">GPU de centro de datos</text>

  <rect class="med" x="270" y="80" width="90" height="40" rx="6"/><text class="tw" x="315" y="105">INT8</text>
  <text class="lbl" x="315" y="150">8 bits</text>
  <text class="sub" x="315" y="167">~4× más pequeño</text>

  <rect class="small" x="420" y="88" width="55" height="24" rx="6"/><text class="tw" x="447" y="105" font-size="11">INT4</text>
  <text class="lbl" x="447" y="150">4 bits</text>
  <text class="sub" x="447" y="167">cabe en un portátil</text>

  <line class="fl" x1="210" y1="100" x2="270" y2="100" marker-end="url(#a)"/>
  <line class="fl" x1="360" y1="100" x2="420" y2="100" marker-end="url(#a)"/>

  <text class="cap" x="320" y="200">Se pierde algo de precisión, pero el modelo ocupa mucha menos memoria y corre en hardware modesto.</text>
</svg>
