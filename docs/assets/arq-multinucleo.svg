<svg width="1200" height="440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" font-family="system-ui, sans-serif" role="img" aria-label="Multinúcleo: varios núcleos en un chip, cada uno ejecutando un hilo en paralelo">
  <style>
    .chip{fill:none;stroke:#3a47b8;stroke-width:2}
    .core{fill:#eef0fb;stroke:#3a47b8;stroke-width:1.5}
    .thread{fill:#3a47b8}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .tw{font-size:10px;font-weight:700;fill:#fff;text-anchor:middle}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:12px;fill:#666;text-anchor:middle}
  </style>
  <rect width="600" height="220" fill="#ffffff"/>
  <text class="ttl" x="300" y="30">Un chip, varios núcleos en paralelo</text>

  <rect class="chip" x="60" y="50" width="480" height="110" rx="10"/>
  <g>
    <rect class="core" x="85"  y="70" width="100" height="70" rx="6"/><text class="t" x="135" y="98">Núcleo 1</text>
    <rect class="thread" x="100" y="108" width="70" height="20" rx="4"/><text class="tw" x="135" y="122">hilo A</text>

    <rect class="core" x="200" y="70" width="100" height="70" rx="6"/><text class="t" x="250" y="98">Núcleo 2</text>
    <rect class="thread" x="215" y="108" width="70" height="20" rx="4"/><text class="tw" x="250" y="122">hilo B</text>

    <rect class="core" x="315" y="70" width="100" height="70" rx="6"/><text class="t" x="365" y="98">Núcleo 3</text>
    <rect class="thread" x="330" y="108" width="70" height="20" rx="4"/><text class="tw" x="365" y="122">hilo C</text>

    <rect class="core" x="430" y="70" width="100" height="70" rx="6"/><text class="t" x="480" y="98">Núcleo 4</text>
    <rect class="thread" x="445" y="108" width="70" height="20" rx="4"/><text class="tw" x="480" y="122">hilo D</text>
  </g>

  <text class="cap" x="300" y="190">Cuatro hilos avanzan a la vez (TLP). Sacarle partido es trabajo del software:</text>
  <text class="cap" x="300" y="208">dividir la tarea y sincronizar (ahí aparecen carreras y bloqueos).</text>
</svg>
