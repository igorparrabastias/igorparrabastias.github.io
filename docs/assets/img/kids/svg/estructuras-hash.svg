<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 195" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="Tabla hash: el nombre Ana con una función llave va directo al cajón correcto, sin buscar uno por uno">
  <defs>
    <marker id="arr-hash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- caption pill -->
  <rect x="45" y="7" width="390" height="30" rx="15" fill="#eef0ff"/>
  <text x="240" y="27" text-anchor="middle" font-size="15" fill="#3b3f5c">Hash: de nombre a cajón ¡en un solo paso! 🔑</text>

  <!-- input box: the key -->
  <rect x="16" y="72" width="112" height="62" rx="12" fill="#ffd54f"/>
  <text x="72" y="97"  text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">clave</text>
  <text x="72" y="122" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">"Ana"</text>

  <!-- arrow: input to function -->
  <line x1="128" y1="103" x2="162" y2="103" stroke="#1565c0" stroke-width="3" marker-end="url(#arr-hash)"/>

  <!-- hash function box -->
  <rect x="165" y="76" width="106" height="54" rx="12" fill="#ba68c8"/>
  <text x="218" y="99"  text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">función</text>
  <text x="218" y="122" text-anchor="middle" font-size="22">🔑</text>

  <!-- arrow: function to output -->
  <line x1="271" y1="103" x2="305" y2="103" stroke="#1565c0" stroke-width="3" marker-end="url(#arr-hash)"/>

  <!-- output box: the drawer -->
  <rect x="308" y="60" width="152" height="86" rx="12" fill="#64b5f6"/>
  <text x="384" y="90"  text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">cajón #3</text>
  <text x="384" y="118" text-anchor="middle" font-size="26">📦</text>

  <!-- labels below -->
  <g font-size="13" text-anchor="middle">
    <text x="72"  y="152" fill="#3b3f5c">entrada</text>
    <text x="218" y="152" fill="#3b3f5c">transforma</text>
    <text x="384" y="155" fill="#2e7d32">¡directo! ✅</text>
  </g>

  <!-- bottom note -->
  <text x="240" y="178" text-anchor="middle" font-size="13" fill="#3b3f5c">sin recorrer uno por uno 🚀 busca en tiempo constante</text>
</svg>
