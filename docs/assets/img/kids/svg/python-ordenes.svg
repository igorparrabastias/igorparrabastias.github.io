<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 210" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="Una niña le da una orden al computador con palabras y él obedece">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#3b3f5c"/>
    </marker>
  </defs>

  <!-- caption -->
  <rect x="50" y="8" width="380" height="28" rx="14" fill="#eef0ff"/>
  <text x="240" y="27" text-anchor="middle" font-size="14" fill="#3b3f5c">Das una orden con palabras… ¡y el computador obedece! 🪄</text>

  <!-- niña (emoji) -->
  <text x="70" y="158" text-anchor="middle" font-size="70">👧</text>

  <!-- globo de diálogo -->
  <rect x="116" y="82" width="150" height="56" rx="12" fill="#ffd54f"/>
  <polygon points="120,116 94,136 142,122" fill="#ffd54f"/>
  <text x="191" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">print(</text>
  <text x="191" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">'¡Hola!'</text>

  <!-- flecha -->
  <line x1="274" y1="116" x2="320" y2="116" stroke="#3b3f5c" stroke-width="3" marker-end="url(#ah)"/>

  <!-- monitor exterior -->
  <rect x="328" y="66" width="138" height="100" rx="12" fill="#64b5f6"/>
  <!-- pantalla interior -->
  <rect x="342" y="78" width="110" height="70" rx="8" fill="#eef0ff"/>
  <!-- texto en pantalla -->
  <text x="397" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#2e7d32">¡Hola!</text>
  <text x="397" y="136" text-anchor="middle" font-size="22">😊</text>
</svg>
