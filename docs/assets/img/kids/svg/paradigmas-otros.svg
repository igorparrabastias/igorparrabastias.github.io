<svg width="960" height="390" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 195" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="Muchos lenguajes de programación distintos se comunican todos con el mismo computador">
  <defs>
    <marker id="aho" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#64b5f6"/>
    </marker>
  </defs>

  <!-- caption -->
  <rect x="50" y="8" width="380" height="26" rx="13" fill="#eef0ff"/>
  <text x="240" y="26" text-anchor="middle" font-size="14" fill="#3b3f5c">¡Muchos idiomas, un solo computador amigo! 💻</text>

  <!-- computer -->
  <rect x="330" y="58" width="130" height="112" rx="12" fill="#90a4ae"/>
  <rect x="342" y="70" width="106" height="66" rx="6" fill="#eef0ff"/>
  <text x="395" y="113" text-anchor="middle" font-size="30">😊</text>
  <rect x="358" y="170" width="74" height="8" rx="4" fill="#64b5f6"/>

  <!-- bubble 1: Python -->
  <rect x="10" y="38" width="120" height="34" rx="17" fill="#81c784"/>
  <text x="70" y="60" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">🐍 Python</text>
  <line x1="130" y1="55" x2="328" y2="95" stroke="#64b5f6" stroke-width="2" marker-end="url(#aho)"/>

  <!-- bubble 2: PHP -->
  <rect x="10" y="93" width="120" height="34" rx="17" fill="#ba68c8"/>
  <text x="70" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">🐘 PHP</text>
  <line x1="130" y1="110" x2="328" y2="114" stroke="#64b5f6" stroke-width="2" marker-end="url(#aho)"/>

  <!-- bubble 3: Ruby -->
  <rect x="10" y="148" width="120" height="34" rx="17" fill="#ff8a65"/>
  <text x="70" y="170" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">💎 Ruby</text>
  <line x1="130" y1="165" x2="328" y2="135" stroke="#64b5f6" stroke-width="2" marker-end="url(#aho)"/>

  <!-- bubble 4: Go -->
  <rect x="170" y="47" width="110" height="34" rx="17" fill="#ffd54f"/>
  <text x="225" y="69" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">🐹 Go</text>
  <line x1="280" y1="64" x2="328" y2="88" stroke="#64b5f6" stroke-width="2" marker-end="url(#aho)"/>

  <!-- bubble 5: Rust -->
  <rect x="175" y="148" width="110" height="34" rx="17" fill="#64b5f6"/>
  <text x="230" y="170" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">🦀 Rust</text>
  <line x1="285" y1="165" x2="328" y2="142" stroke="#64b5f6" stroke-width="2" marker-end="url(#aho)"/>
</svg>
