<svg width="960" height="372" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 186" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="El navegador pide la página al servidor y el servidor la devuelve">
  <defs>
    <marker id="arR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#1565c0"/>
    </marker>
    <marker id="arL" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- caption -->
  <rect x="60" y="8" width="360" height="28" rx="14" fill="#eef0ff"/>
  <text x="240" y="27" text-anchor="middle" font-size="14" fill="#3b3f5c">El navegador pide · el servidor responde</text>

  <!-- Browser (left) -->
  <rect x="15" y="48" width="162" height="122" rx="12" fill="#64b5f6"/>
  <text x="96" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">🌐 Navegador</text>
  <!-- browser screen -->
  <rect x="22" y="78" width="148" height="85" rx="8" fill="#eef0ff"/>
  <!-- address bar -->
  <rect x="28" y="83" width="136" height="18" rx="5" fill="white" stroke="#64b5f6" stroke-width="1.5"/>
  <text x="96" y="96" text-anchor="middle" font-size="11" fill="#3b3f5c">www.algo.com</text>
  <!-- content placeholder lines -->
  <rect x="28" y="108" width="136" height="8" rx="3" fill="#90a4ae" opacity="0.5"/>
  <rect x="28" y="122" width="100" height="8" rx="3" fill="#90a4ae" opacity="0.5"/>
  <rect x="28" y="136" width="120" height="8" rx="3" fill="#90a4ae" opacity="0.5"/>

  <!-- Server (right) -->
  <rect x="303" y="48" width="162" height="122" rx="12" fill="#81c784"/>
  <text x="384" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">🖥️ Servidor</text>
  <!-- server file area -->
  <rect x="310" y="78" width="148" height="85" rx="8" fill="#eef0ff"/>
  <rect x="316" y="84" width="136" height="19" rx="5" fill="#ff8a65"/>
  <text x="384" y="97" text-anchor="middle" font-size="12" fill="#1a1a2e">📄 HTML</text>
  <rect x="316" y="109" width="136" height="19" rx="5" fill="#ffd54f"/>
  <text x="384" y="122" text-anchor="middle" font-size="12" fill="#1a1a2e">🎨 CSS</text>
  <rect x="316" y="134" width="136" height="19" rx="5" fill="#ba68c8"/>
  <text x="384" y="147" text-anchor="middle" font-size="12" fill="#1a1a2e">✨ JavaScript</text>

  <!-- Request arrow → -->
  <line x1="181" y1="90" x2="299" y2="90" stroke="#1565c0" stroke-width="3" marker-end="url(#arR)"/>
  <text x="240" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">📨 pide</text>

  <!-- Response arrow ← -->
  <line x1="301" y1="128" x2="183" y2="128" stroke="#2e7d32" stroke-width="3" marker-end="url(#arL)"/>
  <text x="240" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">📬 devuelve</text>

</svg>
