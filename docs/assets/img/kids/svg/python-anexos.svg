<svg width="960" height="370" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 185" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="Una pila de libros extra con lupa y estrella: temas curiosos para explorar">

  <!-- caption -->
  <rect x="50" y="8" width="380" height="28" rx="14" fill="#eef0ff"/>
  <text x="240" y="27" text-anchor="middle" font-size="14" fill="#3b3f5c">Temas extra para los más curiosos ✨</text>

  <!-- libro 3 (encima) -->
  <rect x="130" y="54" width="220" height="38" rx="10" fill="#64b5f6"/>
  <text x="240" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Python e IA 🤖</text>

  <!-- libro 2 (medio) -->
  <rect x="122" y="94" width="228" height="38" rx="10" fill="#ffd54f"/>
  <text x="240" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Basura 🗑️ y memoria</text>

  <!-- libro 1 (abajo) -->
  <rect x="114" y="134" width="236" height="38" rx="10" fill="#ff8a65"/>
  <text x="240" y="158" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Binario: 0s y 1s 💡</text>

  <!-- lupa -->
  <text x="68" y="118" text-anchor="middle" font-size="50">🔎</text>

  <!-- estrella -->
