<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 245" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="Heap o montículo: pirámide de nodos donde el número mayor con corona siempre queda en la cima">

  <!-- caption pill -->
  <rect x="60" y="6" width="360" height="30" rx="15" fill="#eef0ff"/>
  <text x="240" y="26" text-anchor="middle" font-size="15" fill="#3b3f5c">Heap: el mayor siempre queda en la cima 👑</text>

  <!-- connector lines (behind nodes) -->
  <g stroke="#90a4ae" stroke-width="2">
    <!-- root to children -->
    <line x1="240" y1="98"  x2="135" y2="126"/>
    <line x1="240" y1="98"  x2="345" y2="126"/>
    <!-- left child to grandchildren -->
    <line x1="135" y1="180" x2="72"  y2="196"/>
    <line x1="135" y1="180" x2="198" y2="196"/>
    <!-- right child to grandchildren -->
    <line x1="345" y1="180" x2="282" y2="196"/>
    <line x1="345" y1="180" x2="408" y2="196"/>
  </g>

  <!-- crown above root -->
  <text x="240" y="44" text-anchor="middle" font-size="26">👑</text>

  <!-- root node: 9 (max) -->
  <circle cx="240" cy="68" r="30" fill="#ffd54f" stroke="#f9a825" stroke-width="3"/>
  <text x="240" y="77" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a2e">9</text>

  <!-- level-1 children -->
  <circle cx="135" cy="153" r="28" fill="#ff8a65"/>
  <text x="135" y="162" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a2e">7</text>

  <circle cx="345" cy="153" r="28" fill="#ff8a65"/>
  <text x="345" y="162" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a2e">6</text>

  <!-- level-2 grandchildren -->
  <circle cx="72"  cy="218" r="23" fill="#81c784"/>
  <text x="72"  y="226" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a2e">4</text>

  <circle cx="198" cy="218" r="23" fill="#81c784"/>
  <text x="198" y="226" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a2e">3</text>

  <circle cx="282" cy="218" r="23" fill="#81c784"/>
  <text x="282" y="226" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a2e">5</text>

  <circle cx="408" cy="218" r="23" fill="#81c784"/>
  <text x="408" y="226" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a2e">2</text>
</svg>
