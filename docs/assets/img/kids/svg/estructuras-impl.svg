<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 224" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="Llave inglesa ensamblando una caja paso a paso: construir tu propia estructura de datos">
  <defs>
    <marker id="arr-impl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- caption pill -->
  <rect x="30" y="8" width="420" height="30" rx="15" fill="#eef0ff"/>
  <text x="240" y="28" text-anchor="middle" font-size="15" fill="#3b3f5c">Implementar: armar tú mismo la caja, pieza por pieza 🔧</text>

  <!-- wrench emoji (large) -->
  <text x="78" y="130" text-anchor="middle" font-size="56">🔧</text>

  <!-- arrow from wrench to box -->
  <line x1="112" y1="112" x2="152" y2="112" stroke="#1565c0" stroke-width="3" marker-end="url(#arr-impl)"/>

  <!-- the box being built (main rect) -->
  <rect x="155" y="58" width="240" height="130" rx="12" fill="#81c784" stroke="#1565c0" stroke-width="3"/>

  <!-- bolt circles at corners -->
  <circle cx="178" cy="80"  r="10" fill="#90a4ae" stroke="#1a1a2e" stroke-width="2"/>
  <circle cx="372" cy="80"  r="10" fill="#90a4ae" stroke="#1a1a2e" stroke-width="2"/>
  <circle cx="178" cy="166" r="10" fill="#90a4ae" stroke="#1a1a2e" stroke-width="2"/>
  <circle cx="372" cy="166" r="10" fill="#90a4ae" stroke="#1a1a2e" stroke-width="2"/>

  <!-- box label -->
  <text x="275" y="115" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Mi estructura</text>
  <text x="275" y="140" text-anchor="middle" font-size="14" fill="#1a1a2e">hecha a mano 🛠️</text>

  <!-- bottom label -->
  <text x="240" y="212" text-anchor="middle" font-size="13" fill="#3b3f5c">defines tú cómo se agrega, se quita y se busca</text>
</svg>
