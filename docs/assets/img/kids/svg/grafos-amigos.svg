<svg width="960" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="Red de amigos: personas conectadas; amigos de tus amigos que quizás conozcas">
  <rect x="70" y="8" width="340" height="30" rx="15" fill="#eef0ff"/>
  <text x="240" y="28" text-anchor="middle" font-size="15" fill="#3b3f5c">Amigos de tus amigos 👥</text>

  <!-- connections -->
  <g stroke="#90a4ae" stroke-width="5" stroke-linecap="round">
    <line x1="120" y1="110" x2="240" y2="70"/>
    <line x1="120" y1="110" x2="240" y2="150"/>
    <line x1="240" y1="70"  x2="360" y2="110"/>
    <line x1="240" y1="150" x2="360" y2="110"/>
  </g>
  <!-- suggestion link (dashed) -->
  <line x1="120" y1="110" x2="360" y2="110" stroke="#ff8a65" stroke-width="4" stroke-dasharray="8 7"/>

  <!-- people -->
  <g text-anchor="middle" font-size="26">
    <circle cx="120" cy="110" r="28" fill="#64b5f6"/><text x="120" y="120">🙂</text>
    <circle cx="240" cy="70"  r="26" fill="#ffd54f"/><text x="240" y="79">😀</text>
    <circle cx="240" cy="150" r="26" fill="#ba68c8"/><text x="240" y="159">😎</text>
    <circle cx="360" cy="110" r="28" fill="#81c784"/><text x="360" y="120">🤝</text>
  </g>
  <text x="240" y="195" text-anchor="middle" font-size="13" fill="#ff8a65">— — quizás se conozcan — —</text>
</svg>
