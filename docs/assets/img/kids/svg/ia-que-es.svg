<svg width="960" height="420" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 210" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="Tarjetas de gato, perro y flor apuntan hacia un robot que aprende y da una respuesta: así funciona la IA">
  <defs>
    <marker id="arq" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#90a4ae"/>
    </marker>
  </defs>

  <!-- caption pill -->
  <rect x="60" y="8" width="360" height="30" rx="15" fill="#eef0ff"/>
  <text x="240" y="28" text-anchor="middle" font-size="15" fill="#3b3f5c">Ve muchos ejemplos y aprende solo 🤖</text>

  <!-- Example cards (left) -->
  <rect x="15" y="52" width="88" height="44" rx="10" fill="#64b5f6"/>
  <text x="59" y="80" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">🐱 gato</text>

  <rect x="15" y="103" width="88" height="44" rx="10" fill="#ff8a65"/>
  <text x="59" y="131" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">🐶 perro</text>

  <rect x="15" y="154" width="88" height="44" rx="10" fill="#81c784"/>
  <text x="59" y="182" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">🌸 flor</text>

  <!-- Bracket: vertical brace + horizontal arrow -->
  <line x1="106" y1="74" x2="106" y2="176" stroke="#90a4ae" stroke-width="2.5"/>
  <line x1="106" y1="125" x2="177" y2="125" stroke="#90a4ae" stroke-width="2.5" marker-end="url(#arq)"/>

  <!-- Robot (center) -->
  <rect x="180" y="80" width="100" height="90" rx="12" fill="#ffd54f" stroke="#f9a825" stroke-width="3"/>
  <text x="230" y="140" text-anchor="middle" font-size="42">🤖</text>

  <!-- Arrow robot to response -->
  <line x1="283" y1="125" x2="315" y2="125" stroke="#90a4ae" stroke-width="2.5" marker-end="url(#arq)"/>

  <!-- Response bubble -->
  <rect x="317" y="80" width="150" height="90" rx="12" fill="#ba68c8"/>
  <text x="392" y="119" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">✅ ¡Es</text>
  <text x="392" y="143" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">un gato!</text>
</svg>
