<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 162" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="Una pregunta con signo de interrogacion llega a una pila de documentos, luego a un robot y finalmente sale una respuesta con checkmark verde">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#90a4ae"/>
    </marker>
  </defs>

  <!-- caption pill -->
  <rect x="40" y="8" width="400" height="30" rx="15" fill="#eef0ff"/>
  <text x="240" y="28" text-anchor="middle" font-size="15" fill="#3b3f5c">Busca en documentos y te responde 📚🤖</text>

  <!-- Question bubble -->
  <rect x="12" y="55" width="90" height="70" rx="12" fill="#64b5f6"/>
  <text x="57" y="99" text-anchor="middle" font-size="30" font-weight="700" fill="#1a1a2e">❓</text>

  <!-- Arrow 1 -->
  <line x1="105" y1="90" x2="130" y2="90" stroke="#90a4ae" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Documents pile -->
  <rect x="148" y="62" width="70" height="62" rx="10" fill="#ffd54f"/>
  <rect x="140" y="55" width="70" height="62" rx="10" fill="#ff8a65"/>
  <text x="175" y="97" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a2e">📄</text>

  <!-- Arrow 2 -->
  <line x1="213" y1="90" x2="238" y2="90" stroke="#90a4ae" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Robot -->
  <rect x="241" y="55" width="82" height="70" rx="12" fill="#ba68c8"/>
  <text x="282" y="100" text-anchor="middle" font-size="34" font-weight="700" fill="#1a1a2e">🤖</text>

  <!-- Arrow 3 -->
  <line x1="326" y1="90" x2="351" y2="90" stroke="#90a4ae" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Response bubble -->
  <rect x="354" y="55" width="118" height="70" rx="12" fill="#81c784"/>
  <text x="413" y="87" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">✅</text>
  <text x="413" y="109" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">¡Aqui esta!</text>

  <!-- Labels -->
  <text x="57"  y="143" text-anchor="middle" font-size="12" fill="#3b3f5c">Tu pregunta</text>
  <text x="175" y="143" text-anchor="middle" font-size="12" fill="#3b3f5c">Documentos</text>
  <text x="282" y="143" text-anchor="middle" font-size="12" fill="#3b3f5c">Robot IA</text>
  <text x="413" y="143" text-anchor="middle" font-size="12" fill="#3b3f5c">¡Respuesta!</text>
</svg>
