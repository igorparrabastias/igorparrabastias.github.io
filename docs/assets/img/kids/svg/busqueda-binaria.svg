<svg width="960" height="420" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 210" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="Búsqueda binaria: miro el del medio y descarto la mitad que no sirve">
  <defs>
    <marker id="ah2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- caption -->
  <rect x="40" y="8" width="400" height="30" rx="15" fill="#eef0ff"/>
  <text x="240" y="28" text-anchor="middle" font-size="15" fill="#3b3f5c">Parto a la mitad hasta encontrar el 7 🎯</text>

  <!-- magnifier over middle -->
  <text x="240" y="62" text-anchor="middle" font-size="22">🔍</text>

  <!-- boxes 1..9 -->
  <g font-size="22" font-weight="700" text-anchor="middle">
    <!-- discarded left half (1..5): greyed -->
    <g opacity="0.32">
      <rect x="27"  y="74" width="42" height="54" rx="10" fill="#90a4ae"/><text x="48"  y="109" fill="#1a1a2e">1</text>
      <rect x="75"  y="74" width="42" height="54" rx="10" fill="#90a4ae"/><text x="96"  y="109" fill="#1a1a2e">2</text>
      <rect x="123" y="74" width="42" height="54" rx="10" fill="#90a4ae"/><text x="144" y="109" fill="#1a1a2e">3</text>
      <rect x="171" y="74" width="42" height="54" rx="10" fill="#90a4ae"/><text x="192" y="109" fill="#1a1a2e">4</text>
    </g>
    <!-- middle (5): the one we looked at -->
    <rect x="219" y="74" width="42" height="54" rx="10" fill="#64b5f6" stroke="#1565c0" stroke-width="3"/><text x="240" y="109" fill="#1a1a2e">5</text>
    <!-- kept right half (6..9): bright -->
    <rect x="267" y="74" width="42" height="54" rx="10" fill="#81c784"/><text x="288" y="109" fill="#1a1a2e">6</text>
    <rect x="315" y="74" width="42" height="54" rx="10" fill="#ffd54f" stroke="#f9a825" stroke-width="4"/><text x="336" y="109" fill="#1a1a2e">7</text>
    <rect x="363" y="74" width="42" height="54" rx="10" fill="#81c784"/><text x="384" y="109" fill="#1a1a2e">8</text>
    <rect x="411" y="74" width="42" height="54" rx="10" fill="#81c784"/><text x="432" y="109" fill="#1a1a2e">9</text>
  </g>
  <text x="336" y="68" text-anchor="middle" font-size="18">⭐</text>

  <!-- labels -->
  <text x="96"  y="156" text-anchor="middle" font-size="13" fill="#90a4ae">se descarta ✂️</text>
  <line x1="267" y1="150" x2="453" y2="150" stroke="#2e7d32" stroke-width="3" marker-end="url(#ah2)"/>
  <text x="360" y="172" text-anchor="middle" font-size="13" fill="#2e7d32">aquí sigo buscando</text>
</svg>
