<svg width="960" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="Mensaje con candado: el sobre viaja cifrado para que nadie pueda leerlo por el camino">
  <!-- caption pill -->
  <rect x="55" y="8" width="370" height="30" rx="15" fill="#eef0ff"/>
  <text x="240" y="28" text-anchor="middle" font-size="14" fill="#3b3f5c">El mensaje viaja con candado: ¡nadie lo puede espiar! 🔒</text>

  <!-- envelope body -->
  <rect x="80" y="58" width="320" height="122" rx="12" fill="#64b5f6" stroke="#1565c0" stroke-width="2"/>

  <!-- envelope flap V (fold at top of envelope) -->
  <polyline points="80,58 240,132 400,58" fill="none" stroke="#1565c0" stroke-width="2.5"/>

  <!-- envelope corner diagonals (bottom corners to center fold) -->
  <line x1="80" y1="180" x2="240" y2="132" stroke="#1565c0" stroke-width="1.5" opacity="0.5"/>
  <line x1="400" y1="180" x2="240" y2="132" stroke="#1565c0" stroke-width="1.5" opacity="0.5"/>

  <!-- padlock background -->
  <circle cx="240" cy="132" r="32" fill="#ffd54f" stroke="#f9a825" stroke-width="3"/>

  <!-- padlock emoji -->
  <text x="240" y="145" text-anchor="middle" font-size="30">🔒</text>
</svg>
