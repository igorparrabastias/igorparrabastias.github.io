<svg width="960" height="420" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 210" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="La estadística busca patrones y da probabilidades, como 95 por ciento gato">
  <rect x="50" y="8" width="380" height="30" rx="15" fill="#eef0ff"/>
  <text x="240" y="28" text-anchor="middle" font-size="15" fill="#3b3f5c">Patrones y probabilidades 📊🎲</text>

  <!-- bar chart -->
  <line x1="50" y1="184" x2="250" y2="184" stroke="#90a4ae" stroke-width="3"/>
  <rect x="62"  y="140" width="34" height="44" rx="6" fill="#64b5f6"/>
  <rect x="110" y="96"  width="34" height="88" rx="6" fill="#ff8a65"/>
  <rect x="158" y="120" width="34" height="64" rx="6" fill="#81c784"/>
  <rect x="206" y="74"  width="34" height="110" rx="6" fill="#ba68c8"/>
  <text x="150" y="204" text-anchor="middle" font-size="13" fill="#3b3f5c">encuentra lo que se repite</text>

  <!-- probabilidad -->
  <g font-size="18" font-weight="700" fill="#1a1a2e">
    <rect x="290" y="78"  width="150" height="44" rx="10" fill="#81c784"/><text x="365" y="106" text-anchor="middle">🐱 95%</text>
    <rect x="290" y="130" width="150" height="44" rx="10" fill="#eef0ff"/><text x="365" y="158" text-anchor="middle" fill="#3b3f5c">🐶 5%</text>
  </g>
</svg>
