<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 215" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="El decorador envuelve la función en un regalo sin cambiar lo que hay adentro">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#3b3f5c"/>
    </marker>
  </defs>

  <!-- caption -->
  <rect x="44" y="8" width="392" height="28" rx="14" fill="#eef0ff"/>
  <text x="240" y="27" text-anchor="middle" font-size="14" fill="#3b3f5c">El decorador envuelve la función sin abrirla 🎁</text>

  <!-- IZQUIERDA: función simple -->
  <rect x="20" y="84" width="156" height="82" rx="12" fill="#81c784"/>
  <text x="98" y="122" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">función</text>
  <text x="98" y="144" text-anchor="middle" font-size="13" fill="#1565c0">def saludar():</text>

  <!-- flecha -->
  <line x1="180" y1="126" x2="234" y2="126" stroke="#3b3f5c" stroke-width="3" marker-end="url(#ah)"/>

  <!-- DERECHA: tapa del regalo (decorador) -->
  <rect x="242" y="46" width="214" height="28" rx="10" fill="#ba68c8"/>
  <text x="349" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#eef0ff">@decorador 🎀</text>

  <!-- DERECHA: cuerpo del regalo -->
  <rect x="238" y="72" width="222" height="134" rx="12" fill="#ff8a65"/>

  <!-- DERECHA: función de adentro (igual, sin cambios) -->
  <rect x="260" y="102" width="178" height="70" rx="8" fill="#81c784"/>
  <text x="349" y="136" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">función</text>
  <text x="349" y="158" text-anchor="middle" font-size="13" fill="#1565c0">def saludar():</text>
</svg>
