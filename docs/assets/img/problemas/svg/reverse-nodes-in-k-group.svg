<svg width="960" height="440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="Invertir una lista enlazada de a grupos de k igual a 2: 1 2 3 4 se convierte en 2 1 4 3">
  <defs>
    <marker id="rk-ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#3b3f5c"/>
    </marker>
    <marker id="rk-ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- caption -->
  <rect x="30" y="8" width="420" height="30" rx="15" fill="#eef0ff"/>
  <text x="240" y="28" text-anchor="middle" font-size="15" fill="#3b3f5c">Doy vuelta los nodos de a grupos (aquí k = 2)</text>

  <!-- ANTES -->
  <text x="34" y="84" font-size="13" fill="#90a4ae">antes</text>
  <g font-size="20" font-weight="700" text-anchor="middle">
    <circle cx="110" cy="80" r="22" fill="#64b5f6"/><text x="110" y="87" fill="#1a1a2e">1</text>
    <circle cx="190" cy="80" r="22" fill="#64b5f6"/><text x="190" y="87" fill="#1a1a2e">2</text>
    <circle cx="290" cy="80" r="22" fill="#ba68c8"/><text x="290" y="87" fill="#1a1a2e">3</text>
    <circle cx="370" cy="80" r="22" fill="#ba68c8"/><text x="370" y="87" fill="#1a1a2e">4</text>
  </g>
  <line x1="134" y1="80" x2="166" y2="80" stroke="#3b3f5c" stroke-width="3" marker-end="url(#rk-ah)"/>
  <line x1="214" y1="80" x2="266" y2="80" stroke="#3b3f5c" stroke-width="3" marker-end="url(#rk-ah)"/>
  <line x1="314" y1="80" x2="346" y2="80" stroke="#3b3f5c" stroke-width="3" marker-end="url(#rk-ah)"/>

  <!-- DESPUÉS -->
  <text x="34" y="178" font-size="13" fill="#90a4ae">después</text>
  <g font-size="20" font-weight="700" text-anchor="middle">
    <circle cx="110" cy="174" r="22" fill="#81c784"/><text x="110" y="181" fill="#1a1a2e">2</text>
    <circle cx="190" cy="174" r="22" fill="#81c784"/><text x="190" y="181" fill="#1a1a2e">1</text>
    <circle cx="290" cy="174" r="22" fill="#ffd54f"/><text x="290" y="181" fill="#1a1a2e">4</text>
    <circle cx="370" cy="174" r="22" fill="#ffd54f"/><text x="370" y="181" fill="#1a1a2e">3</text>
  </g>
  <line x1="134" y1="174" x2="166" y2="174" stroke="#2e7d32" stroke-width="3" marker-end="url(#rk-ahg)"/>
  <line x1="214" y1="174" x2="266" y2="174" stroke="#2e7d32" stroke-width="3" marker-end="url(#rk-ahg)"/>
  <line x1="314" y1="174" x2="346" y2="174" stroke="#2e7d32" stroke-width="3" marker-end="url(#rk-ahg)"/>

  <!-- group brackets -->
  <text x="150" y="116" text-anchor="middle" font-size="12" fill="#1565c0">grupo 1</text>
  <text x="330" y="116" text-anchor="middle" font-size="12" fill="#8e24aa">grupo 2</text>
</svg>
