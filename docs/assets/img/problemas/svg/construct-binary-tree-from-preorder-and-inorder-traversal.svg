<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="El primero del preorden es la raíz 3; en el inorden lo que queda a su izquierda va a la izquierda del árbol y lo de la derecha a la derecha">
  <!-- caption -->
  <rect x="14" y="8" width="452" height="30" rx="15" fill="#eef0ff"/>
  <text x="240" y="28" text-anchor="middle" font-size="14" fill="#3b3f5c">El 1º del preorden es la raíz; el inorden parte izquierda/derecha</text>

  <!-- preorden -->
  <text x="60" y="78" text-anchor="middle" font-size="13" fill="#90a4ae">preorden</text>
  <g font-size="18" font-weight="700" text-anchor="middle">
    <rect x="132" y="56" width="42" height="38" rx="8" fill="#ffd54f" stroke="#f9a825" stroke-width="3"/><text x="153" y="81" fill="#1a1a2e">3</text>
    <rect x="180" y="56" width="42" height="38" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="2"/><text x="201" y="81" fill="#1a1a2e">9</text>
    <rect x="228" y="56" width="42" height="38" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="2"/><text x="249" y="81" fill="#1a1a2e">20</text>
    <rect x="276" y="56" width="42" height="38" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="2"/><text x="297" y="81" fill="#1a1a2e">15</text>
    <rect x="324" y="56" width="42" height="38" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="2"/><text x="345" y="81" fill="#1a1a2e">7</text>
  </g>
  <text x="153" y="50" text-anchor="middle" font-size="11" fill="#f9a825">raíz</text>

  <!-- inorden -->
  <text x="60" y="128" text-anchor="middle" font-size="13" fill="#90a4ae">inorden</text>
  <g font-size="18" font-weight="700" text-anchor="middle">
    <rect x="132" y="106" width="42" height="38" rx="8" fill="#64b5f6" stroke="#1565c0" stroke-width="2"/><text x="153" y="131" fill="#1a1a2e">9</text>
    <rect x="180" y="106" width="42" height="38" rx="8" fill="#ffd54f" stroke="#f9a825" stroke-width="3"/><text x="201" y="131" fill="#1a1a2e">3</text>
    <rect x="228" y="106" width="42" height="38" rx="8" fill="#ba68c8"/><text x="249" y="131" fill="#1a1a2e">15</text>
    <rect x="276" y="106" width="42" height="38" rx="8" fill="#ba68c8"/><text x="297" y="131" fill="#1a1a2e">20</text>
    <rect x="324" y="106" width="42" height="38" rx="8" fill="#ba68c8"/><text x="345" y="131" fill="#1a1a2e">7</text>
  </g>
  <text x="153" y="160" text-anchor="middle" font-size="11" fill="#1565c0">izquierda</text>
  <text x="297" y="160" text-anchor="middle" font-size="11" fill="#8e24aa">derecha</text>

  <!-- tree -->
  <line x1="240" y1="190" x2="190" y2="226" stroke="#3b3f5c" stroke-width="2"/>
  <line x1="240" y1="190" x2="300" y2="226" stroke="#3b3f5c" stroke-width="2"/>
  <line x1="300" y1="226" x2="266" y2="256" stroke="#3b3f5c" stroke-width="2"/>
  <line x1="300" y1="226" x2="336" y2="256" stroke="#3b3f5c" stroke-width="2"/>
  <g font-size="16" font-weight="700" text-anchor="middle">
    <circle cx="240" cy="186" r="17" fill="#ffd54f" stroke="#f9a825" stroke-width="2"/><text x="240" y="192" fill="#1a1a2e">3</text>
    <circle cx="190" cy="230" r="17" fill="#64b5f6"/><text x="190" y="236" fill="#1a1a2e">9</text>
    <circle cx="300" cy="230" r="17" fill="#ba68c8"/><text x="300" y="236" fill="#1a1a2e">20</text>
    <circle cx="266" cy="258" r="14" fill="#ba68c8"/><text x="266" y="263" fill="#1a1a2e">15</text>
    <circle cx="336" cy="258" r="14" fill="#ba68c8"/><text x="336" y="263" fill="#1a1a2e">7</text>
  </g>
</svg>
