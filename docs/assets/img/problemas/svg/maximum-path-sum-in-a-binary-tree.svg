<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="La ruta de suma máxima en el árbol pasa por 15, 20 y 7 y suma 42">
  <!-- caption -->
  <rect x="22" y="8" width="436" height="30" rx="15" fill="#eef0ff"/>
  <text x="240" y="28" text-anchor="middle" font-size="15" fill="#3b3f5c">La mejor ruta puede no pasar por la raíz: 15+20+7 = 42</text>

  <!-- edges -->
  <line x1="240" y1="80" x2="160" y2="135" stroke="#3b3f5c" stroke-width="2"/>
  <line x1="240" y1="80" x2="320" y2="135" stroke="#2e7d32" stroke-width="5"/>
  <line x1="320" y1="135" x2="260" y2="190" stroke="#2e7d32" stroke-width="5"/>
  <line x1="320" y1="135" x2="380" y2="190" stroke="#2e7d32" stroke-width="5"/>

  <!-- nodes -->
  <g font-size="18" font-weight="700" text-anchor="middle">
    <circle cx="240" cy="76" r="22" fill="#90a4ae"/><text x="240" y="83" fill="#1a1a2e">−10</text>
    <circle cx="160" cy="139" r="22" fill="#90a4ae"/><text x="160" y="146" fill="#1a1a2e">9</text>
    <circle cx="320" cy="139" r="24" fill="#ffd54f" stroke="#f9a825" stroke-width="3"/><text x="320" y="146" fill="#1a1a2e">20</text>
    <circle cx="260" cy="194" r="22" fill="#81c784" stroke="#2e7d32" stroke-width="3"/><text x="260" y="201" fill="#1a1a2e">15</text>
    <circle cx="380" cy="194" r="22" fill="#81c784" stroke="#2e7d32" stroke-width="3"/><text x="380" y="201" fill="#1a1a2e">7</text>
  </g>

  <!-- result pill -->
  <rect x="36" y="180" width="120" height="40" rx="14" fill="#eef0ff"/>
  <text x="96" y="205" text-anchor="middle" font-size="16" font-weight="700" fill="#2e7d32">= 42 🏆</text>
</svg>
