<svg width="1280" height="480" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" font-family="system-ui, sans-serif" role="img" aria-label="CBOW predice la palabra central a partir del contexto; Skip-Gram predice el contexto a partir de la palabra">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:1.5}
    .bd{fill:#3a47b8}
    .t{font-size:12px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .tw{font-size:12px;font-weight:700;fill:#fff;text-anchor:middle}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:1.8;fill:none}
    .cap{font-size:11px;fill:#888;text-anchor:middle}
  </style>
  <rect width="640" height="240" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#9aa0c8"/></marker></defs>

  <!-- CBOW -->
  <text class="ttl" x="160" y="30">CBOW</text>
  <text class="cap" x="160" y="48">contexto → palabra</text>
  <rect class="box" x="30" y="60"  width="80" height="24"/><text class="t" x="70" y="77">el</text>
  <rect class="box" x="30" y="90"  width="80" height="24"/><text class="t" x="70" y="107">gato</text>
  <rect class="box" x="30" y="120" width="80" height="24"/><text class="t" x="70" y="137">en el</text>
  <rect class="bd"  x="150" y="85" width="70" height="44" rx="6"/><text class="tw" x="185" y="111">modelo</text>
  <rect class="box" x="250" y="92" width="90" height="30" rx="6" stroke="#e0663f"/><text class="t" x="295" y="112">sofá</text>
  <line class="fl" x1="110" y1="72"  x2="150" y2="100" marker-end="url(#a)"/>
  <line class="fl" x1="110" y1="102" x2="150" y2="106" marker-end="url(#a)"/>
  <line class="fl" x1="110" y1="132" x2="150" y2="112" marker-end="url(#a)"/>
  <line class="fl" x1="220" y1="107" x2="250" y2="107" marker-end="url(#a)"/>

  <line x1="350" y1="40" x2="350" y2="200" stroke="#e6e6ef" stroke-width="1.5"/>

  <!-- Skip-Gram -->
  <text class="ttl" x="490" y="30">Skip-Gram</text>
  <text class="cap" x="490" y="48">palabra → contexto</text>
  <rect class="box" x="380" y="92" width="90" height="30" rx="6" stroke="#e0663f"/><text class="t" x="425" y="112">sofá</text>
  <rect class="bd"  x="490" y="85" width="70" height="44" rx="6"/><text class="tw" x="525" y="111">modelo</text>
  <rect class="box" x="590" y="60"  width="40" height="24"/><text class="t" x="610" y="77">el</text>
  <rect class="box" x="590" y="90"  width="40" height="24"/><text class="t" x="610" y="107">gato</text>
  <rect class="box" x="590" y="120" width="40" height="24"/><text class="t" x="610" y="137">en</text>
  <line class="fl" x1="470" y1="107" x2="490" y2="107" marker-end="url(#a)"/>
  <line class="fl" x1="560" y1="100" x2="590" y2="72"  marker-end="url(#a)"/>
  <line class="fl" x1="560" y1="106" x2="590" y2="102" marker-end="url(#a)"/>
  <line class="fl" x1="560" y1="112" x2="590" y2="132" marker-end="url(#a)"/>

  <text class="cap" x="320" y="225">Dos formas de entrenar los mismos vectores: una rellena el hueco, la otra adivina los vecinos.</text>
</svg>
