<svg width="1240" height="440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" font-family="system-ui, sans-serif" role="img" aria-label="El gasto de capital en IA crece hacia el billón, con el debate entre inversión sensata y burbuja">
  <style>
    .axis{stroke:#9aa0c8;stroke-width:1.5}
    .bar{fill:#3a47b8}
    .t{font-size:11px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .ttl{font-size:13px;font-weight:700;fill:#333;text-anchor:middle}
    .cap{font-size:11px;fill:#666;text-anchor:middle}
    .lbl{font-size:10px;fill:#666;text-anchor:middle}
    .side{font-size:11px;font-weight:700;text-anchor:middle}
  </style>
  <rect width="620" height="220" fill="#ffffff"/>
  <text class="ttl" x="310" y="26">El capex se dispara… ¿inversión o burbuja?</text>

  <line class="axis" x1="55" y1="160" x2="300" y2="160"/>
  <line class="axis" x1="55" y1="55" x2="55" y2="160"/>
  <rect class="bar" x="80"  y="135" width="34" height="25" opacity="0.55"/>
  <rect class="bar" x="135" y="115" width="34" height="45" opacity="0.7"/>
  <rect class="bar" x="190" y="90"  width="34" height="70" opacity="0.85"/>
  <rect class="bar" x="245" y="60"  width="34" height="100"/>
  <text class="lbl" x="262" y="52">→ billón $</text>
  <text class="lbl" x="178" y="178">gasto anual del sector ↑</text>

  <line x1="330" y1="50" x2="330" y2="185" stroke="#ccc" stroke-width="1"/>

  <!-- balanza -->
  <text class="side" x="420" y="70" fill="#2e8b57">a favor</text>
  <text class="lbl" x="420" y="90">la demanda no para</text>
  <text class="lbl" x="420" y="106">cada salto halla uso</text>

  <text class="side" x="540" y="70" fill="#e0663f">cautela</text>
  <text class="lbl" x="540" y="90">ingresos aún futuros</text>
  <text class="lbl" x="540" y="106">chips se deprecian</text>
  <text class="lbl" x="540" y="122">financiación circular</text>

  <line x1="370" y1="150" x2="600" y2="150" stroke="#9aa0c8" stroke-width="2"/>
  <polygon points="485,150 475,168 495,168" fill="#9aa0c8"/>

  <text class="cap" x="310" y="205">¿Apuesta sensata por una tecnología transformadora, o euforia que recuerda a burbujas pasadas?</text>
</svg>
